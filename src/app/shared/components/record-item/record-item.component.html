<div class="record-item-card" (click)="onRecordClick($event, record)">

  <div class="record-item-card__inner">

    <div class="record-item-card__image"
         [style.background-image] = "`url(${getKrameriusBaseUrl()}/items/${record.pid}/image/thumb)`"
    >

      <span class="badge model">{{ record.model | translate }}</span>

    </div>

    <div class="record-item-card__content">

      <div class="title" [title]="record.title">{{ record.title.length > 35 ? (record.title.slice(0, 35) + '...') : record.title }}</div>

      <div class="subtitle" *ngIf="record.authors && record.authors?.length">
        {{ record.authors.join(', ').length > 35 ? (record.authors.join(', ').slice(0, 35) + '...') : record.authors.join(', ') }}
      </div>

      <div class="subtitle" *ngIf="record.date">
        {{ record.date }}
      </div>

      <div class="access-label">
<!--        <app-accessibility-badge [accessibility]="record.accessibility"></app-accessibility-badge>-->
      </div>

    </div>

  </div>

</div>
