<label class="form-control">

  <mat-checkbox
    [checked]="checked"
    [disabled]="disabled"
    (change)="toggled.emit()"
    color="tertiary"
  >
    <label *ngIf="label | translate as translatedLabel">{{ truncateLabel ? ((label | translate).length > 15 ? ((label | translate).slice(0, 15) + '...') : (label | translate)) : (label | translate) }}</label>

    <span class="count">({{ count }})</span>
  </mat-checkbox>

  <i *ngIf="icon" [ngClass]="icon"></i>

</label>
