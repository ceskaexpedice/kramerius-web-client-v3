<a class="category-item"
   [href]="url"
   (click)="recordHandler.onNavigate($event, url)">

  @if (icon) {
    @if (isIconClass) {
      <i [class]="icon"></i>
    } @else {
      <img [src]="icon" [alt]="label | translate" />
    }
  }

  <span class="label">{{ label | translate }}</span>

  @if (count) {
    <span class="count badge badge-xs">{{ count }}</span>
  }

</a>
