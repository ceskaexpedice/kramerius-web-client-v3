<div class="date-picker--container">

  <app-input-date
    [valueSignal]="fromDate"
    (valueChange)="onFromDateInput($event)"
    [label]="'DD.MM.YYYY'"
    [minDate]="minDate"
    [maxDate]="maxDate"
    [size]="'lg'"
    [theme]="'dark'"
    [postfixIcon]="'icon-calendar'"
  ></app-input-date>

  <div class="offset-buttons">

    <button class="outlined tertiary sm" [class.selected]="offset() === 1" (click)="onOffsetClick(1)">
      +1 {{ 'day' | translate | lowercase }}
    </button>

    <button class="outlined tertiary sm" [class.selected]="offset() === 3" (click)="onOffsetClick(3)">
      +3 {{ 'days' | translate | lowercase }}
    </button>

    <button class="outlined tertiary sm" [class.selected]="offset() === 7" (click)="onOffsetClick(7)">
      + {{'week' | translate | lowercase}}
    </button>

    <button class="outlined tertiary sm" (click)="toggleOpenedMore()">
      + {{openedMore ? ('hide' | translate | lowercase) : ('more' | translate | lowercase)}}
    </button>

  </div>

  @if (openedMore) {
    <div class="more-section--inputs">

      <app-input-date
        [valueSignal]="fromDate"
        (valueChange)="onFromDateInput($event)"
        [minDate]="minDate"
        [maxDate]="maxDate"
        [label]="'DD.MM.YYYY'"
        [size]="'lg'"
        [theme]="'dark'"
        [postfixIcon]="'icon-calendar'"
      ></app-input-date>

      -

      <app-input-date
        [valueSignal]="toDate"
        (valueChange)="onToDateInput($event)"
        [minDate]="minDate"
        [maxDate]="maxDate"
        [label]="'DD.MM.YYYY'"
        [size]="'lg'"
        [theme]="'dark'"
        [postfixIcon]="'icon-calendar'"
      ></app-input-date>

    </div>

  }


</div>
