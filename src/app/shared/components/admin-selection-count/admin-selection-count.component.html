<ng-container *ngIf="selectionService.selectionMode() && selectionService.hasSelection()">
  <span class="selection-count">{{ 'selected-count' | translate }}: {{ selectionService.selectedCount() }}</span>
</ng-container>

<button class="button outlined sm square-button close-button" aria-label="{{ 'Close select mode' | translate }}"
  *ngIf="selectionService.selectionMode()" (click)="selectionService.toggleSelectionMode()">
  <i class="icon-close"></i>
</button>
