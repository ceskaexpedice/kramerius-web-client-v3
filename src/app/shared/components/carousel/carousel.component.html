<section class="carousel-wrapper">

  <div class="carousel-actions" *ngIf="isScrollable && actionsPosition === 'top'">
    <ng-container *ngTemplateOutlet="carouselActions"></ng-container>
  </div>

  <div class="carousel-content-wrapper" [ngClass]="{ 'edge-to-edge': edgeToEdge }">

    <div class="carousel-content" #scrollContainer>
      <ng-content></ng-content>
    </div>

  </div>

  <div class="carousel-actions" *ngIf="isScrollable && actionsPosition === 'bottom'">
    <ng-container *ngTemplateOutlet="carouselActions"></ng-container>
  </div>

</section>

<ng-template #carouselActions>
  <button class="outlined icon-button nav left light"
          aria-label="{{'scroll-left' | translate}}"
          (click)="scrollLeft()" [disabled]="!canScrollLeft">
    <i class="icon-arrow-left-1"></i>
  </button>

  <button class="outlined icon-button nav right light"
          aria-label="{{'scroll-right' | translate}}"
          (click)="scrollRight()" [disabled]="!canScrollRight">
    <i class="icon-arrow-right-1"></i>
  </button>
</ng-template>
