<div class="autocomplete" [ngClass]="inputTheme">

  <form (submit)="$event.preventDefault(); search()">

    <mat-form-field class="autocomplete-field" appearance="fill">
      <input
        matInput
        type="text"
        [formControl]="searchControl"
        [matAutocomplete]="auto"
        (keyup.enter)="search()"
        [placeholder]="'Hledat ve veřejných dokumentech' | translate"
      />

      <div matSuffix class="input--icons">

        <i class="icon-question input--icon"></i>

        <i class="icon-microphone-2 input--icon"></i>

        <button type="button" class="icon-button primary" (click)="search()">
          <i class="icon-search-normal"></i>
        </button>

      </div>



      <mat-autocomplete
        #auto="matAutocomplete"
        autoActiveFirstOption
        (optionSelected)="onOptionSelected($event)"
      >
        @for (option of filteredOptions | async; track option) {
          <mat-option [value]="option">{{ option }}</mat-option>
        }
      </mat-autocomplete>
    </mat-form-field>

  </form>

</div>
