<div class="accessibility-badge--container" [ngClass]="'accessibility-' + accessibility">

  <span>{{ 'accessibility-label-' + accessibility | translate }}</span>

  @if (showIcon) {
  <i
    [class]="accessibility === DocumentAccessibilityEnum.PUBLIC ? 'icon-eye-public' : (accessibility === 'in_library' ? 'icon-in-house' : 'icon-locked')"></i>
  }

</div>
