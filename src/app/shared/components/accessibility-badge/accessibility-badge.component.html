<div class="accessibility-badge--container" [ngClass]="'accessibility-' + accessibility">

  @if (textOnly) {
    <span>{{ 'accessibility-label-' + accessibility | translate }}</span>
  }

  @if (showIcon && !textOnly) {
  <i
    [class]="accessibility === 'public' ? 'icon-eye-public' : (accessibility === 'in_library' ? 'icon-in-house' : 'icon-locked')"></i>
  }

</div>
