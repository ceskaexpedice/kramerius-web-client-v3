<div class="viewer-controls" [class.pdf-layout]="type === 'pdf'" [class.image-layout]="type === 'image'">
  <!-- Common buttons for both viewers -->

  <button (click)="onZoomIn()" class="button tertiary outlined" [appCdkTooltip]="'viewer-controls.zoom-in' | translate">
    <i class="icon icon-search-zoom-in-1"></i>
  </button>

  <button (click)="onZoomOut()" class="button tertiary outlined"
    [appCdkTooltip]="'viewer-controls.zoom-out' | translate">
    <i class="icon icon-search-zoom-out-1"></i>
  </button>

  <button (click)="onFullscreen()" class="button tertiary outlined"
    [appCdkTooltip]="'viewer-controls.fullscreen' | translate">
    <i class="icon icon-maximize-3"></i>
  </button>

  <button (click)="onFitToScreen()" class="button tertiary outlined"
    [appCdkTooltip]="'viewer-controls.fit-to-screen' | translate">
    <i class="icon icon-maximize-1"></i>
  </button>

  <button (click)="onToggleFitToWidth()" class="button tertiary outlined"
    [appCdkTooltip]="'viewer-controls.fit-to-width' | translate">
    <i class="icon icon-grid-lock"></i>
  </button>

  <!-- PDF-specific buttons -->
  <ng-container *ngIf="type === 'pdf'">

    <button (click)="onScrollMode()" class="button tertiary outlined"
      [appCdkTooltip]="'viewer-controls.toggle-scroll-mode' | translate">
      <i class="icon icon-pharagraphspacing"></i>
    </button>

    <!--    <button (click)="onTextView()" class="button tertiary outlined" title="Toggle Text View">-->
    <!--      <i class="icon icon-text"></i>-->
    <!--    </button>-->

    <!--    <button (click)="onBookMode()" class="button tertiary outlined" title="Book mode">-->
    <!--      <i class="icon icon-book"></i>-->
    <!--    </button>-->
  </ng-container>

  <button (click)="onBookMode()" class="button tertiary outlined"
    [appCdkTooltip]="'viewer-controls.book-mode' | translate">
    <i class="icon icon-book-1"></i>
  </button>

  <button class="button tertiary outlined" (click)="onRotate()" [appCdkTooltip]="'viewer-controls.rotate' | translate">
    <i class="icon icon-rotate-right"></i>
  </button>

  <!-- Image-specific buttons -->
  <ng-container *ngIf="type === 'image'">
    <!--    <button (click)="onDrawRectangle()" class="button tertiary outlined" title="Draw Rectangle">-->
    <!--      <i class="icon icon-square"></i>-->
    <!--    </button>-->
    <button *ngIf="(iiifBookMode$ | async) === false" (click)="onSelectArea()" class="button tertiary outlined"
      [appCdkTooltip]="'viewer-controls.select-area' | translate">
      <i class="icon icon-crop"></i>
    </button>
  </ng-container>

</div>
