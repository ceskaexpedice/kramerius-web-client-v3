<div class="range-slider" [ngClass]="[layout, inputStyle]">
  <!-- VARIANT: INLINE -->
  <ng-container *ngIf="layout === 'inline'; else verticalLayout">

    <div class="inputs-inline">

      <app-input-date
        *ngIf="type === 'date'"
        [valueSignal]="fromDate"
        (valueChange)="onFromInput($event)"
        [minDate]="minDate"
        [maxDate]="maxDate"
        [size]="'sm'"
        [theme]="'dark'"
      ></app-input-date>

      <app-input
        *ngIf="type === 'number'"
        [showSubmitButton]="false"
        [theme]="'dark'"
        [type]="'number'"
        [min]="min"
        [size]="'sm'"
        [max]="max"
        (valueChange)="onFromInput($event)"
        [signalInput]="from"
        [withIcons]="false"
        [showNumberStepper]="showInputNumberStepper"
        [ariaLabel]="'date-from-input--arialabel' | translate"
      ></app-input>

      <!-- Slider -->
      <div class="sliders" [style.background]="getSliderBackground()">
        <input
          class="range from-slider"
          type="range"
          [min]="getSliderMin()"
          [max]="getSliderMax()"
          [step]="getSliderStep()"
          [value]="from()"
          [class.on-top]="from() === to() && lastMoved === 'from'"
          (input)="onSliderFromChange($any($event.target).valueAsNumber)"
          [attr.aria-label]="type === 'date' ? 'Minimum date' : 'Minimum value'"
          [attr.aria-valuemin]="getSliderMin()"
          [attr.aria-valuemax]="getSliderMax()"
          [attr.aria-valuenow]="from()"
          [attr.aria-valuetext]="getDisplayValue('from')"
        />
        <input
          class="range to-slider"
          type="range"
          [min]="getSliderMin()"
          [max]="getSliderMax()"
          [step]="getSliderStep()"
          [value]="to()"
          [class.on-top]="from() === to() && lastMoved === 'to'"
          (input)="onSliderToChange($any($event.target).valueAsNumber)"
          [attr.aria-label]="type === 'date' ? 'Maximum date' : 'Maximum value'"
          [attr.aria-valuemin]="getSliderMin()"
          [attr.aria-valuemax]="getSliderMax()"
          [attr.aria-valuenow]="to()"
          [attr.aria-valuetext]="getDisplayValue('to')"
        />
      </div>

      <app-input-date
        *ngIf="type === 'date'"
        [valueSignal]="toDate"
        (valueChange)="onToInput($event)"
        [minDate]="minDate"
        [maxDate]="maxDate"
        [size]="'sm'"
        [theme]="'dark'"
      ></app-input-date>

      <app-input
        *ngIf="type === 'number'"
        [showSubmitButton]="false"
        [theme]="'dark'"
        [type]="'number'"
        [min]="min"
        [size]="'sm'"
        [max]="max"
        (valueChange)="onToInput($event)"
        [signalInput]="to"
        [withIcons]="false"
        [showNumberStepper]="showInputNumberStepper"
        [ariaLabel]="'date-to-input--arialabel' | translate"
      ></app-input>

    </div>

  </ng-container>

  <!-- VARIANT: DEFAULT (VERTICAL) -->
  <ng-template #verticalLayout>
    <div class="sliders" [style.background]="getSliderBackground()">
      <input
        class="range from-slider"
        type="range"
        [min]="getSliderMin()"
        [max]="getSliderMax()"
        [step]="getSliderStep()"
        [value]="from()"
        [class.on-top]="from() === to() && lastMoved === 'from'"
        (input)="onSliderFromChange($any($event.target).valueAsNumber)"
        [attr.aria-label]="type === 'date' ? 'Minimum date' : 'Minimum value'"
        [attr.aria-valuemin]="getSliderMin()"
        [attr.aria-valuemax]="getSliderMax()"
        [attr.aria-valuenow]="from()"
        [attr.aria-valuetext]="getDisplayValue('from')"
      />
      <input
        class="range to-slider"
        type="range"
        [min]="getSliderMin()"
        [max]="getSliderMax()"
        [step]="getSliderStep()"
        [value]="to()"
        [class.on-top]="from() === to() && lastMoved === 'to'"
        (input)="onSliderToChange($any($event.target).valueAsNumber)"
        [attr.aria-label]="type === 'date' ? 'Maximum date' : 'Maximum value'"
        [attr.aria-valuemin]="getSliderMin()"
        [attr.aria-valuemax]="getSliderMax()"
        [attr.aria-valuenow]="to()"
        [attr.aria-valuetext]="getDisplayValue('to')"
      />
    </div>

    <div class="inputs">
      <div class="date--input">
        <!-- From Input -->
        <div class="date-input-wrapper" *ngIf="type === 'date'">
          <span class="date-display">{{ getDisplayValue('from') }}</span>
          <input
            type="date"
            class="date-input"
            [value]="fromDate() | date:'yyyy-MM-dd'"
            (change)="onFromDateChange($event)"
            aria-label="Start date"
          />
        </div>
        <app-input
          *ngIf="type === 'number'"
          [showSubmitButton]="false"
          [theme]="'dark'"
          [type]="'number'"
          [min]="min"
          [size]="'sm'"
          [max]="max"
          (valueChange)="onFromInput($event)"
          [signalInput]="from"
          [withIcons]="false"
          [showNumberStepper]="showInputNumberStepper"
          [ariaLabel]="'date-from-input--arialabel' | translate"
        ></app-input>
      </div>

      <div class="separator">-</div>

      <div class="date--input">
        <!-- To Input -->
        <div class="date-input-wrapper" *ngIf="type === 'date'">
          <span class="date-display">{{ getDisplayValue('to') }}</span>
          <input
            type="date"
            class="date-input"
            [value]="toDate() | date:'yyyy-MM-dd'"
            (change)="onToDateChange($event)"
            aria-label="End date"
          />
        </div>
        <app-input
          *ngIf="type === 'number'"
          [showSubmitButton]="false"
          [theme]="'dark'"
          [type]="'number'"
          [min]="min"
          [size]="'sm'"
          [max]="max"
          (valueChange)="onToInput($event)"
          [signalInput]="to"
          [withIcons]="false"
          [showNumberStepper]="showInputNumberStepper"
          [ariaLabel]="'date-to-input--arialabel' | translate"
        ></app-input>
      </div>
    </div>
  </ng-template>
</div>
