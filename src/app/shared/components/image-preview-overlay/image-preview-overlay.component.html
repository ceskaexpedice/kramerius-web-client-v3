<div class="image-preview-overlay">
  <div class="image-preview-overlay__backdrop" (click)="onBackdropClick($event)">
    <div class="image-preview-overlay__content">
      <div class="image-preview-overlay__image-container">
        <div class="image-preview-overlay__loader" *ngIf="isLoading">
          <div class="spinner"></div>
        </div>
        <img
          class="image-preview-overlay__image"
          [src]="imageUrl"
          [alt]="altText"
          [class.loading]="isLoading"
          (load)="onImageLoad()"
          (error)="onImageError()"
        />
      </div>
    </div>
  </div>

  <div class="image-preview-overlay__navigation">
    <app-preview-navigation-bar
      [currentIndex]="currentIndex"
      [totalItems]="totalItems"
      (previous)="onPrevious()"
      (next)="onNext()"
      (close)="onClose()">
    </app-preview-navigation-bar>
  </div>
</div>
