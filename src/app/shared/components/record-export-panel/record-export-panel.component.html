<div class="record-export-panel">
  <div class="record-export-panel__header">
    <span class="record-export-panel__title">{{ record?.rootTitle }}</span>
  </div>

  <div class="record-export-panel__loading" *ngIf="loading()">
    <span>{{ 'loading' | translate }}</span>
  </div>

  <div class="record-export-panel__sections" *ngIf="!loading()">
    <app-export-document-section-item-component
      [title]="'export-print-title'"
      [icon]="'icon-printer'"
      [options]="printOptions()"
      [groupName]="'print-export-' + record.pid"
      [collapsible]="true"
      [expanded]="expandedSection() === 'print'"
      (toggle)="onSectionToggle('print')"
      (submit)="onPrintSubmit($event)">
    </app-export-document-section-item-component>

    <app-export-document-section-item-component
      [title]="'export-pdf-title'"
      [icon]="'icon-document-download'"
      [options]="pdfOptions()"
      [groupName]="'pdf-export-' + record.pid"
      [collapsible]="true"
      [expanded]="expandedSection() === 'pdf'"
      (toggle)="onSectionToggle('pdf')"
      (submit)="onPdfSubmit($event)">
    </app-export-document-section-item-component>

    <app-export-document-section-item-component
      [title]="'export-epub-title'"
      [icon]="'icon-book-export'"
      [options]="epubOptions()"
      [groupName]="'epub-export-' + record.pid"
      [collapsible]="true"
      [expanded]="expandedSection() === 'epub'"
      (toggle)="onSectionToggle('epub')"
      (submit)="onEpubSubmit($event)">
    </app-export-document-section-item-component>

    <app-export-document-section-item-component
      [title]="'export-text-title'"
      [icon]="'icon-document-text'"
      [options]="textOptions()"
      [groupName]="'text-export-' + record.pid"
      [collapsible]="true"
      [expanded]="expandedSection() === 'text'"
      (toggle)="onSectionToggle('text')"
      (submit)="onTextSubmit($event)">
    </app-export-document-section-item-component>
  </div>

  <div class="record-export-panel__footer">
    <button class="button outlined tertiary with-icon" (click)="close.emit()">
      {{ 'hide--metadata-sidebar' | translate }}
      <i class="icon-sidebar-bottom"></i>
    </button>
  </div>
</div>
