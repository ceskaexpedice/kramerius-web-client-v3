<div class="admin-actions flex" [class.compact]="compact">

  <button
    class="button primary with-icon"
    (click)="onEditSelected()"
    [disabled]="!selectionService.hasSelection()"
    [title]="'edit-selected' | translate">
    <span>{{ 'edit-selected--admin' | translate }}</span>
    <i class="icon-edit-2"></i>
  </button>

  <!-- Export Selected -->
  <button
    class="button outlined tertiary"
    (click)="onExportSelected()"
    [disabled]="!selectionService.hasSelection()"
    [title]="'export' | translate">
    <span>{{ 'export' | translate }}</span>
    <i class="icon-arrow-right"></i>
  </button>

  <button class="button outlined tertiary m-left-auto"
          *ngIf="compact"
          (click)="adminModeService.toggleAdminMode()"
  >
    <i class="icon-close"></i>
  </button>

  <!-- Select All -->
  <button
    class="button transparent tertiary with-icon"
    (click)="onSelectAll()"
    [disabled]="selectionService.isAllVisibleSelected()"
    [title]="'select-all' | translate">
    <i class="icon-copy-success"></i>
    <span>{{ 'select-all' | translate }}</span>
  </button>

  <!-- Deselect All -->
  <button
    class="button transparent tertiary with-icon"
    (click)="onDeselectAll()"
    [disabled]="!selectionService.hasSelection()"
    [title]="'deselect-all' | translate">
    <i class="icon-close-square"></i>
    <span>{{ 'deselect-all' | translate }}</span>
  </button>

</div>
