<div class="selected-tags" *ngIf="items.length > 0"
  [class.text-first-letter-capitalize]="textTransform === 'capitalize'">
  <mat-chip-set>
    <button *ngIf="clearButtonPosition === 'left' && showClearAll" mat-button
      class="clear-button clear-button-secondary" (click)="clearAll.emit()">
      {{'delete-all' | translate}}
    </button>

    <ng-container *ngFor="let field of uniqueFields">

      <mat-chip *ngIf="showOperators && getOperatorForField(field)" (removed)="removeGroup.emit(field)"
        class="operator-chip">

        <label>
          {{ field }}: {{ getOperatorForField(field) }}
        </label>

        <button matChipRemove>
          <i class="icon-close"></i>
        </button>

      </mat-chip>

      <ng-container *ngFor="let item of getItemsForField(field)">

        <mat-chip (removed)="remove.emit(item)" class="filter-chip"
          [class.and-operator]="getOperatorForField(field) === 'AND'"
          [matTooltip]="getOriginalValue(item).length > maxTagLength ? getOriginalValue(item) : ''">

          <ng-container *ngIf="translateItems; else rawValue">
            <label *ngIf="showFieldNames && field !== 'default'; else valueOnly">
              @if (isLicense(item)) {
                {{ getValue(item) | configLabel:'license' }}
              } @else {
                {{ getTranslationKey(item) | translate }}
              }
            </label>
            <ng-template #valueOnly>
              @if (isLicense(item)) {
                {{ getValue(item) | configLabel:'license' }}
              } @else {
                {{ getTranslationKey(item) | translate }}
              }
            </ng-template>
          </ng-container>

          <ng-template #rawValue>
            <label *ngIf="showFieldNames && field !== 'default'; else rawOnly">
              {{ getValue(item) }}
            </label>
            <ng-template #rawOnly>{{ getValue(item) }}</ng-template>
          </ng-template>

          <button matChipRemove>
            <i class="icon-close"></i>
          </button>

        </mat-chip>

      </ng-container>

    </ng-container>

    <button *ngIf="clearButtonPosition === 'right' && showClearAll" mat-button class="clear-button clear-button-primary"
      (click)="clearAll.emit()">
      {{'delete-all' | translate}}

      <i class="icon-trash"></i>

    </button>

  </mat-chip-set>
</div>
