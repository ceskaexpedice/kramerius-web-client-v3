<div class="selected-tags" *ngIf="items.length > 0">
  <div class="tags-wrapper">
    <button *ngIf="clearButtonPosition === 'left'"
            mat-button
            class="clear-button"
            (click)="clearAll.emit()">
      Vymazať všetko
    </button>

    <mat-chip-set>
      <!-- Loop through each unique field -->
      <ng-container *ngFor="let field of uniqueFields">
        <!-- Add operator chip for the field (only for AND) -->
        <mat-chip
          (removed)="removeOperator.emit(field)"
          *ngIf="getOperatorForField(field)"
          class="operator-chip">
          {{ field }}: {{ getOperatorForField(field) }}
          <button matChipRemove>×</button>
        </mat-chip>

        <!-- Add all filter chips for this field -->
        <ng-container *ngFor="let item of getItemsForField(field)">
          <mat-chip
            (removed)="remove.emit(item)"
            class="filter-chip">
            {{ item | translate }}
            <button matChipRemove>×</button>
          </mat-chip>
        </ng-container>
      </ng-container>
    </mat-chip-set>

    <button *ngIf="clearButtonPosition === 'right'"
            mat-button
            class="clear-button"
            (click)="clearAll.emit()">
      Vymazať všetko
    </button>
  </div>
</div>
