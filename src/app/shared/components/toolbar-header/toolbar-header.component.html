<div class="toolbar-header">

  @if (showBackButton) {
    <button class="icon-button button link primary"
            [attr.aria-label]="'go-back--arialabel' | translate"
            (click)="goBackClicked()">
      <i class="icon-arrow-left-3"></i>
    </button>
  }

  <h2 class="title"
      [class.cursor-pointer]="titleClickable"
      (click)="titleClicked()">{{ title }}</h2>

  <div class="header-actions">
    <ng-content></ng-content>
  </div>

</div>
