<div class="toolbar-header">

  @if (showBackButton) {
    <button class="icon-button button link primary"
            [attr.aria-label]="'go-back--arialabel' | translate"
            (click)="goBackClicked()">
      <i class="icon-arrow-left-2"></i>
    </button>
  }

  <h2 class="title cursor-pointer" (click)="titleClicked()">{{ title }}</h2>

  <div class="header-actions">
    <ng-content></ng-content>
  </div>

</div>
