<div class="export-document--container">

  <app-export-document-section-item-component [title]="'export-jpeg-title'" [icon]="'icon-gallery-import'"
    [options]="jpegOptions()" [groupName]="'jpeg-export'" [selectedOption]="selectedJpegOption"
    (optionChange)="onJpegOptionChange($event)"
    (submit)="onJpegSubmit($event)"></app-export-document-section-item-component>

  <app-export-document-section-item-component [title]="'export-pdf-title'" [icon]="'icon-document-download'"
    [options]="pdfOptions()" [groupName]="'pdf-export'"
    (submit)="onPdfSubmit($event)"></app-export-document-section-item-component>

  <app-export-document-section-item-component [title]="'export-print-title'" [icon]="'icon-printer'"
    [options]="printOptions()" [groupName]="'print-export'"
    (submit)="onPrintSubmit($event)"></app-export-document-section-item-component>

</div>
