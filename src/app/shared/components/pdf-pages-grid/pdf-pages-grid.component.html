<div class="pdf-pages-grid">
  <div *ngIf="pages.length === 0" class="pdf-pages-grid__empty">
    {{ 'loading-pages' | translate }}
  </div>

  <div *ngIf="pages.length > 0" class="pdf-pages-grid__container">
    <div *ngFor="let page of pages" class="pdf-pages-grid__item"
      [class.pdf-pages-grid__item--active]="page.pageNumber === currentPage" (click)="navigateToPage(page.pageNumber)">
      <div class="pdf-pages-grid__thumbnail">
        <app-thumbnail-image
          [src]="getThumbnailUrl(page.pageNumber)"
          [alt]="('page' | translate) + ' ' + page.pageNumber"
          fallbackIcon="document">
        </app-thumbnail-image>
      </div>
      <div class="pdf-pages-grid__number">
        {{ page.pageNumber }}
      </div>
    </div>
  </div>
</div>
