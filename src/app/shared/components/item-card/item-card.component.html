<a class="item-card"
   [class.with-badge]="showAccessibilityBadge && recordHandlerService.isRecordLocked(licenses)"
   [class.selection-mode]="selectionService.selectionMode()"
   [class.selected]="selectionService.selectionMode() && selectionService.isSelected(uuid)"
   [ngClass]="[className, model]"
   [href]="recordHandlerService.getHandleDocumentUrlByModelAndPid(model, uuid)"
   [attr.aria-label]="title"
   (click)="onCardClick($event)">

  <!-- Selection checkbox overlay for admin mode -->
  <div class="item-card__selection-overlay" *ngIf="selectionService.selectionMode()">
    <app-checkbox 
      [model]="selectionService.isSelected(uuid)"
      (modelChange)="onSelectionChange($event)"
      (click)="$event.stopPropagation()">
    </app-checkbox>
  </div>

<div class="item-card__image-container">
    <img
      class="item-card__image"
      [src]="`${getKrameriusBaseUrl()}`"
      [alt]="title"
      loading="lazy"
    />

    <button class="icon-button light rounded item-card__favorite-btn" 
            *ngIf="showFavoriteButton && !selectionService.selectionMode()" 
            [class.favorited]="isItemFavorited$ | async"
            [title]="(isItemFavorited$ | async) ? 'Remove from favorites' : 'Add to favorites'"
            (click)="toggleFavorite($event)">
      <i class="fa" [class.fa-heart]="isItemFavorited$ | async" [class.fa-heart-o]="!(isItemFavorited$ | async)"></i>
    </button>
  </div>

  <div class="item-card__content">
    <div class="title">{{ title.length > 50 ? (title.slice(0, 50) + '...') : title }}</div>
    <div class="subtitle" *ngIf="subtitle">{{ subtitle }}</div>
    <app-accessibility-badge *ngIf="showAccessibilityBadge && recordHandlerService.isRecordLocked(licenses)" [isLocked]="recordHandlerService.isRecordLocked(licenses)"></app-accessibility-badge>
  </div>
</a>

<!-- Favorites Popup positioned outside the card to avoid overflow clipping -->
@if (favoritesPopupState.showPopup()) {
  <div class="favorites-popup-wrapper" 
       [class.positioned]="favoritesPopupState.popupPositioned()">
    <app-favorites-popup
      [itemId]="uuid"
      [itemName]="title"
      (close)="favoritesPopupState.closePopup()">
    </app-favorites-popup>
  </div>
}
