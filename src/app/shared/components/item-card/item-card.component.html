<a *ngIf="link; else nonClickable" [href]="link" class="item-card">
  <img [src]="'https://api.kramerius.mzk.cz/search/api/client/v7.0/items/' + uuid + '/image/thumb'" [alt]="title" />
  <div class="content">
    <div class="title">{{ title }}</div>
    <div class="subtitle" *ngIf="subtitle">{{ subtitle }}</div>
  </div>
</a>

<ng-template #nonClickable>
  <div class="item-card">
    <img [src]="'https://api.kramerius.mzk.cz/search/api/client/v7.0/items/' + uuid + '/image/thumb'" [alt]="title" />
    <div class="content">
      <div class="title">{{ title }}</div>
      <div class="subtitle" *ngIf="subtitle">{{ subtitle }}</div>
    </div>
  </div>
</ng-template>
