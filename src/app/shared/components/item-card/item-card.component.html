<div class="item-card"
     [class.with-badge]="showAccessibilityBadge && recordHandlerService.isRecordLocked(licenses)"
     [class.admin-mode]="adminSelectionService.adminMode()"
     [class.selected]="adminSelectionService.adminMode() && adminSelectionService.isSelected(uuid)"
     [ngClass]="[className, model]"
     (click)="onCardClick($event)">

  <!-- Hidden link for SEO and accessibility when not in admin mode -->
  <a *ngIf="!adminSelectionService.adminMode()" 
     class="item-card__hidden-link"
     [href]="recordHandlerService.getHandleDocumentUrlByModelAndPid(model, uuid)"
     [attr.aria-label]="title"
     tabindex="-1"></a>

<div class="item-card__image-container">
    <img
      class="item-card__image"
      [src]="`${getKrameriusBaseUrl()}`"
      [alt]="title"
      loading="lazy"
    />

    <button class="icon-button light rounded item-card__favorite-btn" *ngIf="showFavoriteButton && !adminSelectionService.adminMode()" (click)="toggleFavorite()">
      <i class="fa fa-heart-o"></i>
    </button>

    <!-- Selection checkbox overlay for admin mode -->
    <div class="item-card__selection-overlay" *ngIf="adminSelectionService.adminMode()">
      <app-checkbox 
        [model]="adminSelectionService.isSelected(uuid)"
        (modelChange)="onSelectionChange($event)"
        (click)="$event.stopPropagation()">
      </app-checkbox>
    </div>
  </div>

  <div class="item-card__content">
    <div class="title">{{ title.length > 50 ? (title.slice(0, 50) + '...') : title }}</div>
    <div class="subtitle" *ngIf="subtitle">{{ subtitle }}</div>
    <app-accessibility-badge *ngIf="showAccessibilityBadge && recordHandlerService.isRecordLocked(licenses)" [isLocked]="recordHandlerService.isRecordLocked(licenses)"></app-accessibility-badge>
  </div>
</div>
