<div class="date-input-wrapper" [ngClass]="[theme, size]">
  <span class="date-display" tabindex="-1">

    @if (prefixIcon) {
      <i [ngClass]="prefixIcon"></i>
    }

    {{ displayValue }}

    @if (postfixIcon) {
      <i [ngClass]="postfixIcon"></i>
    }

  </span>
  <input
    #dateInput
    type="date"
    class="date-input"
    [value]="valueSignal() ? (valueSignal() | date:'yyyy-MM-dd') : ''"
    [min]="min"
    [max]="max"
    (change)="onDateChange($event)"
    (click)="clickedDateInput($event)"
  />
</div>
