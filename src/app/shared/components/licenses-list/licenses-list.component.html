<div class="licenses-list">

  <!-- Header with counts and selection info -->
  <div class="licenses-header">

    <!-- Search Input -->
    <div class="search-controls">

      <app-input
        [placeholder]="'search-licenses-placeholder' | translate"
        [initialValue]="searchQuery"
        [theme]="'dark'"
        [name]="'license-search'"
        aria-label="{{ 'search-licenses-placeholder' | translate }}"
        (valueChange)="onSearchInput($event)"
        [showClearButton]="true"
        [showHelpButton]="false"
        [showSubmitButton]="false"
      ></app-input>

    </div>
  </div>

  <!-- Licenses List Container -->
  <div class="licenses-container" #scrollContainer>

    <!-- License Items -->
    <div *ngIf="filteredLicenses$ | async as licenses" class="licenses-items">
      <div
        *ngFor="let license of licenses; trackBy: trackByName"
        class="license-item">
        <mat-checkbox
          [checked]="isLicenseSelected(license.name)"
          (change)="onLicenseToggle(license.name, $event.checked)">
          <div class="license-info">
            <div class="license-name">{{ license.name | configLabel:'license' }}</div>
          </div>
        </mat-checkbox>
      </div>
    </div>

    <!-- Loading Indicator -->
    <div *ngIf="loading$ | async" class="loading-indicator">
      <mat-spinner diameter="24"></mat-spinner>
      <span>{{ 'loading-licenses' | translate }}</span>
    </div>

  </div>

</div>
