<ng-container *ngIf="visibleItems().length > 0">

  <div>
    <div class="category--header">

      <h4>

        {{label | translate}}

        <span *ngIf="hasAndOperator" class="and-indicator">AND</span>

      </h4>

      <i class="icon-minus-square cursor-pointer" *ngIf="showToggleExpand" (click)="toggleExpanded()"></i>

    </div>

    <div class="flex flex--gap-x2 flex--column" [@expandCollapse]="expanded ? 'expanded' : 'collapsed'">

      <ng-container *ngIf="type !== 'radio'">
        <ng-container *ngFor="let item of visibleItems() | slice:0:maxItems">
          <app-filter-item
            [label]="item.name"
            [checked]="isSelected(item.name)"
            [icon]="item.icon || null"
            [count]="item.count"
            [truncateLabel]="true"
            (toggled)="onToggle(item.name)"
          ></app-filter-item>
        </ng-container>
      </ng-container>

      <ng-container *ngIf="type === 'radio'">
        <app-filter-items-radio
          [items]="visibleItems()"
          [selected]="getSelectedRadioValue()"
          (changed)="onRadioChange($event)"
        ></app-filter-items-radio>
      </ng-container>

<!--      <app-range-slider-->
<!--        *ngIf="type === 'range'"-->
<!--        [min]="filter.meta?.min ?? 0"-->
<!--        [max]="filter.meta?.max ?? 100"-->
<!--        [step]="filter.meta?.step ?? 1"-->
<!--        [initialFrom]="getInitialFrom()"-->
<!--        [initialTo]="getInitialTo()"-->
<!--        [layout]="'inline'"-->
<!--        (rangeChange)="onRangeSliderChange($event)"-->
<!--      ></app-range-slider>-->

      <button class="button primary link p-left-0 flex--space-start" *ngIf="shouldShowMoreButton" (click)="openFilterDialog(facetKey, label, items)">
        {{ 'show-more' | translate }}

        <i class="icon-arrow-right-1"></i>
      </button>

    </div>

  </div>

  <ng-content #categoryContent></ng-content>

  <hr *ngIf="showBottomBorder">

</ng-container>
