<div class="search-results-list">
  @for (item of displayItems; track item.pid) {
    <div
      class="search-result-item"
      [class.with-content]="true"
      [class.active]="isActive(item)"
      (click)="onResultClick(item)">

      <app-detail-page-item
        [page]="item.page || item"
        [type]="'page'"
        [pageNumberPosition]="'left'"
        [pageNumber]="showAllPages ? (item.pageNumber?.toString() || null) : null"
      >
      </app-detail-page-item>

<!--      @if (item.highlightedText) {-->
        <div class="search-result-item--content">

          @if (item.highlightedText && item.highlightedText.length > 0) {
            <div class="highlighted-text" [innerHTML]="item.highlightedText || ' '"></div>
          } @else {
            <div class="no-content--placeholder" [appCdkTooltip]="'no-text-content' | translate" [tooltipPosition]="'bottom'">
              <span class="no-content-icon">
                <i class="icon-text"></i>
              </span>
            </div>
          }

        </div>
<!--      }-->

    </div>
  }
  @if (displayItems.length === 0) {
    <div class="no-results">{{'no_results_to_display' | translate}}</div>
  }
</div>
