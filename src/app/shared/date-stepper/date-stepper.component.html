<div class="stepper-container" [class.mode-toggle]="showModeToggle">

  <ng-container *ngIf="dateMode() === DatePickerMode.Manual">

    <app-input
      class="sm-input"
      [withIcons]="false"
      [type]="'number'"
      [theme]="'dark'"
      [min]="1"
      [max]="getMaxDay(dateFrom)"
      [leadingZero]="true"
      [initialValue]="getDay(dateFrom)"
      [size]="'sm'"
      (valueChange)="onManualPartChange('day', $event)"
    ></app-input>

    <span class="separator">-</span>

    <app-input
      class="sm-input"
      [withIcons]="false"
      [type]="'number'"
      [theme]="'dark'"
      [min]="1"
      [max]="12"
      [leadingZero]="true"
      [initialValue]="getMonth(dateFrom)"
      [size]="'sm'"
      (valueChange)="onManualPartChange('month', $event)"
    ></app-input>

    <span class="separator">-</span>

    <app-input
      class="mid-input"
      [withIcons]="false"
      [type]="'number'"
      [theme]="'dark'"
      [min]="0"
      [max]="9999"
      [initialValue]="getYear(dateFrom)"
      [size]="'sm'"
      (valueChange)="onManualPartChange('year', $event)"
    ></app-input>

    <span class="separator">-</span>

    <app-input
      class="mid-input"
      [withIcons]="false"
      [type]="'number'"
      [theme]="'dark'"
      [min]="0"
      [max]="365"
      [initialValue]="offset"
      [placeholder]="'0 days'"
      [prefix]="'+'"
      [size]="'sm'"
      (valueChange)="onOffsetChange($event)"
    ></app-input>

  </ng-container>

  <ng-container *ngIf="dateMode() === DatePickerMode.Range">

    <app-range-slider
      [type]="'date'"
      [layout]="'inline'"
      [initialFromDate]="dateFrom"
      [initialToDate]="dateTo"
      [minDate]="minDate"
      [maxDate]="maxDate"
      (dateRangeChange)="dateRangeChange($event)"
    ></app-range-slider>

  </ng-container>

</div>

<mat-slide-toggle
  [hideIcon]="true"
  [checked]="dateMode() === DatePickerMode.Range"
  (toggleChange)="toggleDateMode()"
>Výběr období od–do</mat-slide-toggle>
