<div class="lang-switcher-pos" [class.expanded]="expanded" appClickOutside (clickOutside)="close()">
  <div class="selected" (click)="clickedIcon()">
    <div class="icon-lang">
      <img class="flag rounded" [src]="currentLanguage().icon" [alt]="currentLanguage().name" />
    </div>
    <div class="arrow">
      <i class="fa fa-angle-down arrow-icon" [class.arrow-icon--rotated]="expanded"></i>
    </div>
  </div>

  <div class="available-languages" [class.available-languages--hidden]="!expanded">
    <div class="languages-list">
      <div class="lang-item" *ngFor="let lang of languages" (click)="changeLang(lang.code)">
        <div class="lang-item__left">
          <div class="lang-item__icon">
            <img class="flag rounded" [src]="lang.icon" [alt]="lang.name" />
          </div>
          <span class="lang-item__name">{{ lang.name }}</span>
        </div>
      </div>
    </div>
  </div>
</div>
