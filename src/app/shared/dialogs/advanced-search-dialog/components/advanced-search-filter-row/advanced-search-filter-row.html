<div class="filter-row">

  <div class="filter-wrapper">

    <app-select
      [options]="filterTypes"
      [value]="selectedFilterTypeOption()"
      [displayFn]="filterTypeDisplayFn"
      (valueChange)="onFilterTypeChange($event.key)"
      [theme]="'light'"
    >
    </app-select>

    <button (click)="toggleEqualsOperator()" class="equals-operator-btn" [class.not-equals]="!filter.isEquals">{{filter.isEquals ? '=' : '≠'}}</button>

    <ng-container [ngSwitch]="filter.key">
      <app-autocomplete
        *ngIf="filter.inputType === AdvancedFilterType.Autocomplete"
        [initialValue]="filter.elementValue"
        [placeholder]="filter.placeholder || filter.key"
        [showHelpButton]="false"
        [showMicrophoneButton]="false"
        [showSubmitButton]="false"
        [showClearButton]="true"
        [showCaseSensitiveButton]="showCaseSensitiveButton"
        (search)="emitChange()"
        (submit)="autocompleteSubmit($event)"
        (onBlurEvent)="inputBlur()"
        (suggestionSelected)="suggestionSelected($event)"
        [getSuggestions]="getSuggestionsFn"
        [inputTheme]="'dark'"
        [withIcons]="false"
        [size]="'sm'"
        [isCaseSensitive]="filter.caseSensitive || false"
        (onCaseSensitiveEvent)="onExactMatchToggle()"
      ></app-autocomplete>

      @if (filter.inputType === AdvancedFilterType.Text) {
        <div class="w-100 flex flex--column flex--gap-x2">
          <app-input
            [initialValue]="filter.elementValue"
            [placeholder]="filter.placeholder || filter.key"
            [showHelpButton]="false"
            [showSubmitButton]="false"
            [showClearButton]="true"
            [showCaseSensitiveButton]="showCaseSensitiveButton"
            (valueChange)="inputChange($event)"
            (onBlurEvent)="inputBlur()"
            [theme]="'dark'"
            [withIcons]="false"
            [size]="'sm'"
            [isCaseSensitive]="filter.caseSensitive || false"
            (onCaseSensitiveEvent)="onExactMatchToggle()"
          ></app-input>

        </div>
      }

      <app-range-slider
        *ngIf="filter.inputType === AdvancedFilterType.Slider"
        [min]="filter.meta?.min ?? 0"
        [max]="filter.meta?.max ?? 100"
        [step]="filter.meta?.step ?? 1"
        [initialFrom]="getInitialFrom()"
        [initialTo]="getInitialTo()"
        [layout]="'inline'"
        (rangeChange)="onRangeSliderChange($event)"
      ></app-range-slider>

      <app-select
        *ngIf="filter.inputType === AdvancedFilterType.Dropdown"
        [options]="filter.options || []"
        [(value)]="filter.elementValue"
        [theme]="'light'"
        [filterable]="true"
      ></app-select>

<!--      <app-date-stepper-->
<!--        *ngIf="filter.inputType === AdvancedFilterType.Date"-->
<!--        [data]="filter.elementValue"-->
<!--        (dateChange)="onDateChange($event)"-->
<!--        [showModeToggle]="true"-->
<!--      ></app-date-stepper>-->

      <advanced-date-filter
        *ngIf="filter.inputType === AdvancedFilterType.Date"
        [initialValue]="filter.elementValue"
        [solrField]="filter.solrField || ''"
        (valueChange)="onDateFilterChange($event)"
        (addYearFilter)="onAddYearFilter()"
      ></advanced-date-filter>

    </ng-container>
  </div>

  <button (click)="remove.emit()" class="remove-button">
    <i class="icon-trash"></i>
  </button>
</div>
