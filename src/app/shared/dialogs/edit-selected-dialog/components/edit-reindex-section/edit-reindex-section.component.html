<mat-radio-group
  class="radio-group"
  [value]="selectedScope"
  [name]="'reindexScope'"
  (change)="onScopeChange()"
>

  <div class="flex flex--column flex--gap-x2">

    <mat-radio-button
      [value]="'object'"
      class="radio-button"
    >
      {{ 'reindex-object-only' | translate }}
    </mat-radio-button>

    <mat-radio-button
      [value]="'object-and-children'"
      class="radio-button"
    >
      {{ 'reindex-object-and-children' | translate }}
    </mat-radio-button>

  </div>
</mat-radio-group>
