<app-sidebar-dialog-layout
  [config]="dialogConfig"
  (save)="save()"
  (close)="close()"
  (sectionChange)="onSectionChange($event)">

  <app-settings-content
    [settings]="localSettings()"
    [activeSection]="activeSection"
    (settingsChange)="onSettingsChange($event)">
  </app-settings-content>

</app-sidebar-dialog-layout>
