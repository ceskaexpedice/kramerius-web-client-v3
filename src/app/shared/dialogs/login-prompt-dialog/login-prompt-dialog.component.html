<div class="generic-dialog-container">
  <h2>
    {{ titleKey | translate }}
    <button class="button link tertiary icon-button close-button" (click)="onClose()">
      <i class="icon-close"></i>
    </button>
  </h2>

  <div class="dialog-body">

    <div class="content">
      <p>{{ messageKey | translate }}</p>

      <div class="dont-ask-again--container" *ngIf="showDontShowAgain">
        <mat-checkbox class="p-left-0" [(ngModel)]="dontShowAgain">
          <label>
            {{ 'login-prompt-dont-show-again' | translate }}
          </label>
        </mat-checkbox>
      </div>
    </div>

  </div>

  <div class="dialog-actions">
    <button class="button outlined tertiary" (click)="onClose()">
      {{ 'cancel' | translate }}
    </button>
    <button class="button filled primary" (click)="onLogin()">
      {{ 'login' | translate }}
    </button>
  </div>

</div>
