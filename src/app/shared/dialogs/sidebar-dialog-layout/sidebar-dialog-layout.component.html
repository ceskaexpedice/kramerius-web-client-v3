<div class="generic-dialog-container">
  <h2>
    <span class="dialog-title">
      {{ config.title | translate }}
      <span *ngIf="config.subtitle" class="dialog-subtitle">{{ config.subtitle | translate }}</span>
    </span>
    <button class="button link tertiary icon-button close-button" (click)="onClose()">
      <i class="icon-close"></i>
    </button>
  </h2>

  <hr>

  <div class="dialog-body">
    <div class="sidebar">
      <ul>
        <ng-container *ngFor="let section of config.sections">
          <!-- Section with Children -->
          <div *ngIf="section.isTitle && section.children" class="section-group">
            <!-- Section Title (non-clickable) -->
            <li *ngIf="section.isTitle" class="section-title">
              <label>
                <i *ngIf="section.icon && section.icon.length > 0" class="{{ section.icon }}"></i>
                {{ section.label | translate }}
              </label>
            </li>

            <li
              *ngFor="let child of section.children"
              [class.active]="activeSection() === child.key"
              (click)="setActiveSection(child.key)">
              <label>
                <i class="{{ child.icon }}"></i>
                {{ child.label | translate }}
              </label>
              <i class="icon-arrow-right-1"></i>
            </li>
          </div>

          <!-- Action Section (clickable button) -->
          <li
            *ngIf="!section.isTitle && section.isAction"
            class="action-section cursor-pointer"
            (click)="onActionClick(section.key)">
            <label class="cursor-pointer">
              {{ section.label | translate }}
            </label>
            <i *ngIf="section.icon && section.icon.length > 0" class="{{ section.icon }}"></i>
          </li>

          <!-- Regular Section (clickable) -->
          <li
            *ngIf="!section.isTitle && !section.isAction"
            [class.active]="activeSection() === section.key"
            (click)="setActiveSection(section.key)">
            <label>
              <i *ngIf="section.icon && section.icon.length > 0" class="{{ section.icon }}"></i>
              {{ section.label | translate }}
            </label>
            <i class="icon-arrow-right-1"></i>
          </li>
        </ng-container>
      </ul>
    </div>

    <div class="content">
      <ng-content></ng-content>
    </div>
  </div>

  @if (config.showCancelButton || config.showSaveButton || config.customButtons?.length) {


    <hr>

    <div class="footer">
      <!-- Cancel Button -->
      <button
        *ngIf="config.showCancelButton"
        class="button outlined secondary"
        (click)="onClose()">
        {{ (config.cancelButtonLabel || 'cancel') | translate }}
      </button>

      <!-- Custom Buttons -->
      <button
        *ngFor="let button of config.customButtons"
        [class]="'button ' + (button.class)"
        [disabled]="isButtonDisabled(button)"
        (click)="onCustomButtonClick(button.action)">
        <i *ngIf="button.icon" [class]="button.icon"></i>
        {{ button.label | translate }}
      </button>

      <!-- Save Button -->
      <button
        *ngIf="config.showSaveButton"
        class="button primary"
        (click)="onSave()">
        {{ (config.saveButtonLabel || 'save') | translate }}
      </button>
    </div>

  }
</div>
