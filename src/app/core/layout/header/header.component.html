<header class="app-header" [ngClass]="headerType">

  <div class="app-header__left">

    <a routerLink="/" class="logo" (click)="logoClicked()">
      <img [src]="currentAppTheme === AppSettingsThemeEnum.LIGHT ? '/favicon.svg' : '/favicon-dark.svg'" alt="Česká digitální knihovna" />
    </a>

  </div>

  <div *ngIf="showSearchBar" class="search-bar" [class.mobile-search-active]="isMobileSearchOpen">

    <app-autocomplete
      [inputTheme]="'dark'"
      [placeholder]="autocompletePlaceholder | translate"
      [minTermLength]="2"
      [initialValue]="autocompleteService.searchTerm()"
      [getSuggestions]="autocompleteService.getSuggestionsFn"
      [showHelpButton]="false"
      [showMicrophoneButton]="false"
      (search)="autocompleteService.onSearch($event)"
      (submit)="autocompleteService.onSubmit($event)"
      [inputTerm]="autocompleteService.searchTerm"
      [showHistorySuggestions]="true"
      (suggestionSelected)="autocompleteService.onSuggestionSelected($event)">
    </app-autocomplete>

    <button class="outlined light advanced-search-btn"
            aria-label="{{'advanced-search' | translate}}"
            (click)="openAdvancedSearch()">
      {{'advanced-search' | translate}}
    </button>

  </div>

  <nav class="app-header__right" [class.mobile-search-active]="isMobileSearchOpen">

    <a (click)="goToCollections()" class="cursor-pointer desktop-only">{{'collections' | translate}}</a>

    <!--    <a routerLink="/about">{{'about-project' | translate}}</a>-->

    <div class="desktop-only">
      <app-user-info></app-user-info>
    </div>

    <app-lang-picker [class.hide-on-search-active]="isMobileSearchOpen"></app-lang-picker>

    <!-- Mobile search toggle button -->
    <button *ngIf="showSearchBar"
            class="icon-button outlined light mobile-only mobile-search-toggle"
            [class.hide-on-search-active]="isMobileSearchOpen"
            aria-label="Search"
            (click)="toggleMobileSearch()">
      <i class="icon-search-normal"></i>
    </button>

    <button class="icon-button outlined light"
            [class.mobile-search-close]="isMobileSearchOpen"
            aria-label="{{'settings' | translate}}"
            (click)="isMobileSearchOpen ? closeMobileSearch() : openSettings()">
      <i [class]="isMobileSearchOpen ? 'icon-close' : 'icon-settings-1'"></i>
    </button>

    <button class="icon-button mobile-only hamburger-menu--btn"
            [class.primary]="isMobileMenuOpen"
            [class.outlined]="!isMobileMenuOpen"
            [class.light]="!isMobileMenuOpen"
            [class.hide-on-search-active]="isMobileSearchOpen"
            aria-label="Menu"
            (click)="toggleMobileMenu()">
      <i class="icon-hamburger-menu"></i>
    </button>

  </nav>

  <div class="mobile-menu" appClickOutside (clickOutside)="closeMobileMenu()" [class.open]="isMobileMenuOpen">
    <div class="mobile-menu__content">
      <a (click)="goToCollections()" class="cursor-pointer">{{'collections' | translate}}</a>
      <app-user-info></app-user-info>
    </div>
  </div>

</header>
