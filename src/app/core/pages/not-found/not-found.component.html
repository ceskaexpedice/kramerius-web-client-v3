<div class="error-page">
  <div class="error-content">
    <div class="error-code">404</div>
    <h1 class="error-title">{{ 'error.not_found.title' | translate }}</h1>
    <p class="error-message">{{ 'error.not_found.message' | translate }}</p>
    <div class="error-actions">
      <button class="button primary" (click)="goHome()">
        {{ 'error.not_found.go_home' | translate }}
      </button>
    </div>
  </div>
</div>
