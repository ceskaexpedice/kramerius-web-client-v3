@if (!(isAuthenticated | async)) {
  <a class="cursor-pointer" (click)="login()">{{'log-in' | translate}}</a>
}

<!--{{(user | async)?.name}}-->
<!--<a class="cursor-pointer" (click)="logout()">{{'log-out' | translate}}</a>-->

@if ((isAuthenticated | async)) {

  <app-menu
    [displayName]="(user | async)?.name ?? '-'"
    [items]="userMenuItems"
    placement="bottom-end"
    (select)="onUserMenu($event)"
  />

}
