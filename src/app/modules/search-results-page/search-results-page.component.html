<div class="search-results-page">
  <app-filter-sidebar
  ></app-filter-sidebar>

  <div class="results-content">

    <div class="search-results">
      <ng-container *ngIf="results$ | async as results">
        <div *ngFor="let doc of results" class="result-card">
          <h3>{{ doc.title }}</h3>
          <p *ngIf="doc.date">Rok vydania: {{ doc.date }}</p>
          <p *ngIf="doc.model">Typ: {{ doc.model }}</p>
        </div>
      </ng-container>
    </div>

  </div>

</div>
