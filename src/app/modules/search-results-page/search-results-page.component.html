<div class="page-container">
  <div class="page-container__inner">

    <app-filter-sidebar [isDisabled]="selectionService.selectionMode()" [dimmed]="(noResults$ | async) ?? false">
      <app-search-filters></app-search-filters>
    </app-filter-sidebar>

    <div class="page-content">

      <div class="page-content__filters" [class.action-toolbar--tabs-visible]="!selectionService.selectionMode()" [class.sidebar-open]="exportRecord()">
        <app-action-toolbar>
          <div left>
            <!-- Map tab switcher -->
            <ng-container *ngIf="!selectionService.selectionMode()">
              <div class="view-tabs">
                <button class="view-tabs__tab" [class.active]="view() !== ViewOptions.map" (click)="onTabChanged('all')">
                  <i class="icon-element-3"></i>
                  {{ 'tab-all' | translate }}
                </button>
                <button class="view-tabs__tab" [class.active]="view() === ViewOptions.map" (click)="onTabChanged('map')">
                  <i class="icon-location"></i>
                  {{ 'tab-maps' | translate }}
                </button>
              </div>
            </ng-container>

            <!-- Admin view: show admin actions -->
            <ng-container *ngIf="selectionService.selectionMode()">
              <app-admin-actions (exportRequested)="onExportSelected()" (editRequested)="onEditSelected($event)">
              </app-admin-actions>
            </ng-container>
          </div>

          <div right>
            <div class="flex flex--center flex--align-center flex--gap-x3">

              <!-- Show regular controls when not in admin mode -->
              <ng-container *ngIf="!selectionService.selectionMode()">

                <!-- Paginator info: first in right slot, shown in all views -->
                <app-paginator-info
                  *ngIf="view() !== ViewOptions.map"
                  [page]="searchService.page"
                  [pageSize]="searchService.pageSize"
                  [totalCount]="searchService.totalCount">
                </app-paginator-info>
                <app-paginator-info
                  *ngIf="view() === ViewOptions.map"
                  [page]="((mapSearchService.page$ | async) ?? 0) + 1"
                  [pageSize]="mapSearchService.pageSize"
                  [totalCount]="(mapSearchService.totalCount$ | async) ?? 0">
                </app-paginator-info>

                <app-toggle-button-group *ngIf="view() !== ViewOptions.map" [options]="viewOptions" [value]="view()" [size]="'md'" (valueChange)="setView($event)" />

                <div class="toolbar-controls-wrapper flex flex--align-center flex--gap-x2">
                  <app-toolbar-controls [showViewToggle]="false" [showFavorites]="false" [showShare]="false"
                    [showQuote]="false" [showInfo]="false" [showSelect]="!breakpointService.isMobile()"
                    [showDownload]="view() !== ViewOptions.map && searchService.totalCount > 0" [themeDefault]="true"
                    (selectClicked)="selectionService.setSelectionMode(true)"
                    (downloadClicked)="downloadCsv()">
                  </app-toolbar-controls>
                </div>

                <app-results-sort
                  [selectedSort]="searchService.sortBy"
                  [selectedDirection]="searchService.sortDirection" (sortChange)="onSortChange($event)">
                </app-results-sort>
              </ng-container>

              <!-- Show selection count when in admin mode and items are selected -->
              <ng-container *ngIf="selectionService.selectionMode() && selectionService.hasSelection()">
                <span class="selection-count">{{ selectionService.getSelectionSummary() }}</span>
              </ng-container>

              <button class="button outlined tertiary sm square-button" aria-label="{{'Close select mode' | translate}}"
                *ngIf="selectionService.selectionMode()" (click)="selectionService.toggleSelectionMode()">
                <i class="icon-close"></i>
              </button>

            </div>
          </div>
        </app-action-toolbar>
      </div>

      <!-- MAP VIEW -->
      @if (view() === ViewOptions.map) {
        <div class="map-view-container">
          <app-map-browse></app-map-browse>
        </div>
      }

      <!-- ALL VIEW -->
      @if (view() !== ViewOptions.map) {
        <app-search-results-view
          [view]="view()"
          [showSectionHeaders]="showSectionHeaders()"
          [showSelectedTags$]="showSelectedTags$"
          [exportRecord]="exportRecord()"
          (exportRecordChange)="exportRecord.set($event)">
        </app-search-results-view>
      }

    </div>

  </div>

</div>
