<div class="search-results-page">

  <app-filter-sidebar></app-filter-sidebar>

  <div class="results-content">

    <div class="search-results-tabs">
      <div class="search-results-tabs__item" >
        Vše
      </div>
      <div class="search-results-tabs__item" >
        Obrázky
      </div>
      <div class="search-results-tabs__item" >
        Periodika
      </div>
    </div>

    <app-selected-tags></app-selected-tags>

    Vysledky: {{ totalCount$ | async }}

    <div class="search-results-grid">

      <ng-container *ngIf="results$ | async as results">

          <app-record-item *ngFor="let doc of results" [record]="doc"></app-record-item>

      </ng-container>

    </div>

  </div>

</div>
