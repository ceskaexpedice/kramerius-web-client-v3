<div class="search-results-page">
  <div class="search-results-page--inner">

    <app-filter-sidebar>
      <app-search-filters></app-search-filters>
    </app-filter-sidebar>

    <div class="results-content">

      <div class="results-content--filters">

        <app-action-toolbar>
          <div left>
            <app-record-type-tabs></app-record-type-tabs>
          </div>

          <div right>
            <app-paginator-info
              [page]="searchService.page"
              [pageSize]="searchService.pageSize"
              [totalCount]="searchService.totalCount">
            </app-paginator-info>
          </div>
        </app-action-toolbar>

<!--        <app-action-toolbar>-->

<!--          <div actions>-->
<!--            <app-paginator-info-->
<!--              [page]="searchService.page"-->
<!--              [pageSize]="searchService.pageSize"-->
<!--              [totalCount]="searchService.totalCount">-->
<!--            </app-paginator-info>-->
<!--          </div>-->

<!--        </app-action-toolbar>-->

        <app-results-sort></app-results-sort>

      </div>

      <app-selected-tags
        [items]="(searchService.selectedTags | async) || []"
        [operators]="(searchService.getFiltersWithOperators() | async) || {}"
        [showOperators]="false"
        [translateItems]="true"
        (remove)="searchService.removeFilter($event)"
        (removeGroup)="searchService.resetOperator($event)"
        (clearAll)="searchService.clearAllFilters()"
        clearButtonPosition="left">
      </app-selected-tags>

<!--      <ng-container *ngIf="advancedSearchService.isAdvancedSearchActive()">-->
<!--        <div class="advanced-query-box">-->
<!--          <strong>Dotaz pokročilého hledání</strong>-->
<!--          <p>{{ advancedSearchService.getAdvancedSearchPreview() }}</p>-->

<!--          <div class="button-row">-->
<!--            <button class="button primary" (click)="advancedSearchService.openDialog()">Upravit dotaz</button>-->
<!--            <button class="button outlined" (click)="searchService.clearAllFilters()">Nové hledání</button>-->
<!--            <button class="button outlined">Zrušit</button>-->
<!--          </div>-->
<!--        </div>-->
<!--      </ng-container>-->

      <ng-container *ngIf="advancedSearchService.isAdvancedSearchActive()">

        <app-advanced-search-indicator></app-advanced-search-indicator>

      </ng-container>

      <div class="grid--container">
        <ng-container *ngIf="searchService.results$ | async as results">
          <app-record-item *ngFor="let doc of results" [record]="doc"></app-record-item>
        </ng-container>
      </div>

      <app-paginator
        [page]="searchService.page"
        [totalCount]="searchService.totalCount"
        [pageSize]="searchService.pageSize"
        [pageSizeOptions]="[25, 50, 100]"
        (pageChange)="searchService.goToPage($event)"
        (pageSizeChange)="searchService.changePageSize($event)">
      </app-paginator>

    </div>

  </div>
</div>
