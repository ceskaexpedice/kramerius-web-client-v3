<h2>{{ data.facetLabel | translate }}</h2>

<div class="search-input">
  <input
    type="text"
    [formControl]="searchControl"
    placeholder="Hľadať v zozname..."
  />
</div>

<div class="filters--container">

  <app-toggle-button-group
    [options]="sortOptions"
    [value]="sortBy()"
    (valueChange)="setSort($event)"
  />

  <app-toggle-button-group
    [options]="operatorOptions"
    [value]="useOrOperator() ? 'OR' : 'AND'"
    (valueChange)="setOperator($event)"
  />

</div>

<app-paginator-info
  [page]="page"
  [pageSize]="pageSize"
  [totalCount]="totalCount">
</app-paginator-info>

<hr>

<app-selected-tags [items]="(searchService.getFiltersByFacet(data.facetKey) | async) || []" (remove)="searchService.removeFilter($event)" (clearAll)="searchService.clearAllFilters()"></app-selected-tags>

<div class="facet-list">
  <div *ngIf="loading()" class="loading">
    Načítavam...
  </div>
  <label *ngFor="let item of items()" class="facet-item">
    <mat-checkbox
      [checked]="isSelectedFacetItem(item) | async"
      (change)="toggle(item.name)"
    ></mat-checkbox>
    {{ item.name }} ({{ item.count }})
  </label>
</div>

<hr>

<app-paginator
  [page]="page"
  [totalCount]="totalCount"
  [pageSize]="pageSize"
  [pageSizeOptions]="[25, 50, 100]"
  (pageChange)="goToPage($event)"
  [showPageSizeOptions]="false"
></app-paginator>

<div class="footer">
  <button mat-button (click)="close()">Zavrieť</button>
</div>
