<h2>{{ data.facetLabel }}</h2>

<div class="search-input">
  <input
    type="text"
    [formControl]="searchControl"
    placeholder="Hľadať v zozname..."
  />
</div>


<div class="operator-buttons">
  <button mat-button [class.active]="useOrOperator()" (click)="setOperator('OR')">Všetky</button>
  <button mat-button [class.active]="!useOrOperator()" (click)="setOperator('AND')">Niektoré</button>
</div>

Vysledky: {{ totalCount$ | async }}

<hr>

<app-selected-tags [items]="(searchService.getFiltersByFacet(data.facetKey) | async) || []" (remove)="searchService.removeFilter($event)" (clearAll)="searchService.clearAllFilters()"></app-selected-tags>

<div class="facet-list">
  <div *ngIf="loading()" class="loading">
    Načítavam...
  </div>
  <label *ngFor="let item of items()" class="facet-item">
    <mat-checkbox
      [checked]="isSelectedFacetItem(item) | async"
      (change)="toggle(item.name)"
    ></mat-checkbox>
    {{ item.name }} ({{ item.count }})
  </label>
</div>

<app-paginator
  [page]="page"
  [totalCount]="totalCount"
  [pageSize]="pageSize"
  [pageSizeOptions]="[25, 50, 100]"
  (pageChange)="goToPage($event)"
  [showPageSizeOptions]="false"
></app-paginator>

<div class="footer">
  <button mat-button (click)="close()">Zavrieť</button>
</div>
