<h2>
  {{ data.facetLabel | translate }}

  <button class="button link tertiary icon-button close-button" (click)="close()">
    <i class="icon-x"></i>
  </button>
</h2>



<div class="search-input">
  <app-input
    [placeholder]="'filter-dialog.search-placeholder' | translate"
    [theme]="'light'"
    [initialValue]="searchTerm()"
    [showMicButton]="true"
    [showHelpButton]="true"
    [showSubmitButton]="true"
    [changeMicToClearOnFocus]="true"
    (valueChange)="onSearchTermChange($event.toString())"
  />
</div>

<div class="filters--container">

  <app-toggle-button-group
    [options]="sortOptions"
    [value]="sortBy()"
    (valueChange)="setSort($event)"
  />

  <app-toggle-button-group
    [options]="operatorOptions"
    [value]="pendingOperator()"
    (valueChange)="setOperator($event)"
  />

</div>

<app-paginator-info
  [page]="page"
  [pageSize]="pageSize"
  [totalCount]="totalCount">
</app-paginator-info>

<app-selected-tags
  [items]="pendingFilterTags()"
  [operators]="pendingOperators()"
  [showOperators]="false"
  [translateItems]="true"
  (remove)="removePendingTag($event)"
  (removeGroup)="clearPendingOperator()"
  (clearAll)="clearPendingTags()"
  clearButtonPosition="right">
</app-selected-tags>

<hr>

<div class="facet-list">
  <div *ngIf="loading()" class="loading">
    Načítavam...
  </div>
  <label *ngFor="let item of items()" class="facet-item">
    <mat-checkbox
      [checked]="isSelectedFacetItem(item) | async"
      (change)="toggle(item.name)"
    ></mat-checkbox>
    {{ item.name | translate }} ({{ item.count | formatNumber }})
  </label>
</div>

<hr>

<div class="footer">
  <app-paginator
    [page]="page"
    [totalCount]="totalCount"
    [pageSize]="pageSize"
    [pageSizeOptions]="[25, 50, 100]"
    (pageChange)="goToPage($event)"
    [showPageSizeOptions]="false"
  ></app-paginator>

  <button class="button primary" (click)="applyFilter()">{{'dialog.apply' | translate}}</button>
<!--  <button mat-button (click)="close()">Zavrieť</button>-->
</div>
