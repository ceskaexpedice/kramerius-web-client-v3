
<!-- Sidebar toggle button for mobile/tablet -->
<button *ngIf="!breakpointService.sidebarVisible() && !breakpointService.isVisible()"
        class="sidebar-toggle-btn"
        (click)="breakpointService.toggleSidebar()"
        [attr.aria-label]="'open-filters' | translate">
  <i class="icon-filter"></i>
</button>

<!-- Backdrop for mobile overlay -->
<div *ngIf="breakpointService.isVisible() && isOverlay()"
     class="sidebar-backdrop"
     (click)="onBackdropClick()"></div>

<div class="filter-sidebar"
     [class.scrollable]="scrollable"
     [class.overlay]="isOverlay()"
     [class.visible]="breakpointService.isVisible()"
     [class.disabled]="isDisabled"
     [class.expanded]="isExpanded"
     [ngClass]="['padding-' + padding]">

  <!-- Drag handle for mobile bottom sheet -->
  <div *ngIf="isOverlay() && breakpointService.isVisible()"
       class="bottom-sheet-handle"
       (click)="toggleExpanded()">
    <div class="handle-bar"></div>
  </div>

  <!-- Close button for overlay mode -->
  <button *ngIf="isOverlay() && breakpointService.isVisible()"
          class="sidebar-close-btn"
          (click)="breakpointService.toggleSidebar()"
          [attr.aria-label]="'close-filters' | translate">
    <i class="icon-close"></i>
  </button>

  <ng-content></ng-content>

  @if (isDisabled) {
    <div class="sidebar-disabled--overlay"></div>
  }

</div>
