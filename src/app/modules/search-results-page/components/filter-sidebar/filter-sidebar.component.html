<div class="filter-sidebar">

  <app-radio-button
    [value]="'option1'"
    [groupValue]="selectedOption()"
    (groupValueChange)="selectedOption.set($event)">
  </app-radio-button>

  <app-radio-button
    [value]="'option2'"
    [groupValue]="selectedOption()"
    (groupValueChange)="selectedOption.set($event)">
  </app-radio-button>

  <app-range-slider></app-range-slider>

  <ng-container *ngIf="facets$ | async as facets">

    <ng-container *ngFor="let facetKey of facetKeys">

      <div *ngIf="facets[facetKey] && facets[facetKey].length">
        <h4>{{ facetLabels[facetKey] || facetKey }}</h4>
        <ul>
          <li *ngFor="let facet of facets[facetKey]">
            <label class="form-control">
              <app-checkbox 
                [model]="selectedFilters.includes(facetKey + ':' + facet.name)"
                (modelChange)="onToggleFacet(facetKey, facet.name)">
              </app-checkbox>
              {{ facet.name.length > 15 ? (facet.name.slice(0, 15) + '...') : facet.name }} 
              ({{ facet.count }})
            </label>
          </li>
        </ul>
      </div>

      <hr>

    </ng-container>

  </ng-container>

</div>
