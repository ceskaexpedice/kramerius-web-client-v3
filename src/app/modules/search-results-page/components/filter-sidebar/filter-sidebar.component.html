<!-- Sidebar toggle button for mobile/tablet -->
<button *ngIf="!breakpointService.sidebarVisible() && !breakpointService.isVisible()" class="sidebar-toggle-btn"
  [class.left]="toggleButtonPosition === 'left'" (click)="breakpointService.toggleSidebar()"
  [attr.aria-label]="'open-filters' | translate">
  <i [class]="toggleButtonIcon"></i>
</button>

<!-- Capture projected content into a template -->
<ng-template #filterContent>
  <ng-content></ng-content>
</ng-template>

<!-- Mobile slide-up panel mode -->
@if (breakpointService.isMobile()) {
<app-slide-up-panel [title]="'filters' | translate" [(isOpen)]="breakpointService.manualToggle"
  (closed)="breakpointService.manualToggle.set(false)">
  <ng-container *ngTemplateOutlet="filterContent"></ng-container>
</app-slide-up-panel>
}

<!-- Tablet/Desktop overlay and inline modes -->
@if (!breakpointService.isMobile()) {
<!-- Backdrop for tablet overlay -->
<div *ngIf="breakpointService.isVisible() && isOverlay()" class="sidebar-backdrop"
  (click)="onBackdropClick()"></div>

<div class="filter-sidebar" [class.overlay]="isOverlay()" [class.visible]="breakpointService.isVisible()"
  [class.disabled]="isDisabled" [class.dimmed]="dimmed">

  <!-- Close button for tablet overlay mode -->
  <button *ngIf="isOverlay() && breakpointService.isVisible()" class="sidebar-close-btn"
    (click)="breakpointService.toggleSidebar()" [attr.aria-label]="'close-filters' | translate">
    <i class="icon-close"></i>
  </button>

  <!-- Scrollable content area -->
  <div class="filter-content" [class.scrollable]="scrollable" [ngClass]="['padding-' + padding]">
    <ng-container *ngTemplateOutlet="filterContent"></ng-container>
  </div>

  @if (isDisabled) {
  <div class="sidebar-disabled--overlay"></div>
  }

  @if (dimmed) {
  <div class="sidebar-dimmed--overlay"></div>
  }
</div>
}
