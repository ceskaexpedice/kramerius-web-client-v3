  <ng-container left-sidebar>
    <div class="sidebar--container" *ngIf="detailViewService.document$ | async as document">

      <!-- PDF Sidebar for PDF documents -->
      <ng-container *ngIf="document.pdf">
        <app-pdf-sidebar></app-pdf-sidebar>
      </ng-container>

      <!-- Document Sidebar for non-PDF documents -->
      <ng-container *ngIf="!document.pdf">
        <app-document-sidebar [document]="document"></app-document-sidebar>
      </ng-container>

    </div>
  </ng-container>

  <ng-container action-toolbar>
    <ng-container *ngIf="detailViewService.document$ | async as document">
      <app-action-toolbar [hasCenterContent]="document?.rootModel === DocumentTypeEnum.periodical">
        <div class="max-width-100" left>
          <app-toolbar-header
            [title]="document?.mainTitle || ''"
            [showBackButton]="recordHandler.shouldShowBackButton(document)"
            (titleClick)="recordHandler.clickedToolbarTitle(document.model, document.rootPid)"
            (goBack)="recordHandler.goBackClicked(document)">
          </app-toolbar-header>
        </div>
        <div center>
          <ng-container *ngIf="document.model === DocumentTypeEnum.periodicalitem">
            <app-date-navigator
              [value]="document.dateStr || ''"
              [enableCalendarPopup]="true"
              [periodicalChildren]="(detailViewService.periodicalChildren$ | async) || []"
              (goToPrevious)="detailViewService.goToPreviousPeriodicalIssue()"
              (goToNext)="detailViewService.goToNextPeriodicalIssue()"
              (dateSelected)="detailViewService.navigateToDate($event.pid, $event.year)"
            >
            </app-date-navigator>
          </ng-container>
        </div>
        <div right>
          <div class="flex flex--align-center">
            <app-toolbar-controls
              [showViewToggle]="document.model === DocumentTypeEnum.soundrecording"
              [viewToggleOptions]="viewToggleOptions"
              [showFavorites]="false"
              [showShare]="true"
              [showQuote]="true"
              [showInfo]="true"
              [showEdit]="true"
              (infoClicked)="detailViewService.openRecordInfo()"
              [activeViewValue]="detailViewService.soundRecordingViewMode()"
              (viewChanged)="detailViewService.setSoundRecordingViewView($event)"
              (editClicked)="selectionService.toggleSelectionMode()"
              (shareClicked)="recordHandler.openShareDialog(document)"
              (quoteClicked)="recordHandler.openCitationDialog(document)">
            </app-toolbar-controls>
          </div>
        </div>
      </app-action-toolbar>
    </ng-container>
  </ng-container>

  <ng-container main-content>
    <ng-container *ngIf="detailViewService.document$ | async as document">
      <div class="detail-view--page--content--body">
        <div class="detail-view--page--content--wrapper" [class.pdf-document]="document.pdf">

          @if (document.pdf) {

            <app-pdf-viewer [metadata]="document"></app-pdf-viewer>

          } @else {
            <app-iiif-viewer
              *ngIf="detailViewService.currentPagePid && !(detailViewService.loading$ | async)"
              [metadata]="document"
              [imagePid]="detailViewService.currentPagePid">
            </app-iiif-viewer>
          }

          @if (!detailViewService.metadataSidebarVisible) {

            <button
              class="floating-sidebar-toggle button outlined tertiary with-icon"
              (click)="detailViewService.showMetadataSidebar()">
              <i class="icon-sidebar-bottom"></i>
              {{ 'show--metadata-sidebar' | translate }}
            </button>
          }

          <!-- Viewer controls for both PDF and IIIF viewers -->
          @if (document.pdf) {
            @if (!(pdfService.properties$ | async)?.fullscreen) {
              <app-viewer-controls type="pdf"></app-viewer-controls>
            }
          } @else {
            @if (!(iiifViewerService.properties$ | async)?.fullscreen) {
              <app-viewer-controls type="image"></app-viewer-controls>
            }
          }
        </div>
      </div>
    </ng-container>
  </ng-container>

  <ng-container right-sidebar>
    <ng-container *ngIf="detailViewService.document$ | async as document">
      <app-pdf-metadata-sidebar [metadata]="document"></app-pdf-metadata-sidebar>
    </ng-container>
  </ng-container>
