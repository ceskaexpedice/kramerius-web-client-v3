<div class="page--grid" *ngIf="(detailViewService.pages$ | async) as pages">

  @for (page of pages; track page.pid; let index = $index) {
    <app-detail-page-item
      [page]="page"
      [pageNumber]="index + 1"
      [isSelected]="detailViewService.currentPageIndex === index"
      (pageClicked)="clickedPage(index)"
    >
    </app-detail-page-item>
  }
</div>
