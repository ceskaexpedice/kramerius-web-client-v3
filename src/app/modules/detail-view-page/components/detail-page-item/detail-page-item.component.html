<a class="page--item" [ngClass]="['type-' + type, `page--number-${pageNumberPosition}`]" [class.selected]="isSelected"
  [class.admin-mode]="isInSelectionMode()" [class.admin-selected]="isInSelectionMode() && isItemSelected()"
  (click)="onPageClicked($event)">

  <!-- Selection checkbox for admin mode or local selection mode -->
  <div class="page--item__selection" *ngIf="isInSelectionMode()">
    <app-checkbox [model]="isItemSelected()" (modelChange)="onSelectionChange($event)"
      (click)="$event.stopPropagation()">
    </app-checkbox>
  </div>

  <!-- Action buttons -->
  <div class="page--item__actions">

  </div>

  <button class="button transparent icon-button preview-button"
          *ngIf="showPreviewButton"
          (click)="onPreviewClick($event)"
          [attr.aria-label]="'preview-image' | translate"
          [title]="'preview-image' | translate">
    <i class="icon-search-zoom-in-1"></i>
  </button>

  <app-thumbnail-image
    class="page--item__image"
    [src]="getImageUrl()"
    [alt]="('page--number') + '-' + pageNumber"
    [fallbackIcon]="type === 'recording' ? 'music' : 'document'">
  </app-thumbnail-image>

  <!-- Lock overlay for access-denied documents -->
  <div class="page--item__lock locked" [class]="'page--item__lock locked style-' + lockStyle" *ngIf="isLocked">
    <i [class]="lockStyle === 'dnntt' ? 'icon-in-house' : 'icon-locked'"></i>
  </div>
  <div [class]="'page--item__lock unlocked style-' + lockStyle" *ngIf="isAccessible">
    <i class="icon-open-lock"></i>
  </div>

  <span class="page--number" *ngIf="(!isInSelectionMode() || showPageNumberInSelectionMode) && pageNumber">
    {{pageNumber}}
  </span>

</a>
