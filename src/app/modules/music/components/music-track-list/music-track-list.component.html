<table class="track-table">
  <thead>
  <tr>
    <th class="index-col">#</th>
    <th>{{'track-list-table--title' | translate}}</th>
    <th class="duration-col">{{'track-list-table--duration' | translate}}</th>
    <th class="actions-col">{{'track-list-table--actions' | translate}}</th>
  </tr>
  </thead>
  <tbody>

  <tr *ngFor="let track of tracks; let i = index"
      (click)="onSelect(track)"
      app-music-track-item
      [class.playing]="track.pid === playingPid"
      [track]="track"
      [index]="i"
      [selectedPid]="selectedPid"
      [playingPid]="playingPid"
      [viewType]="viewType"
      (toggleFavoriteClicked)="onFavoriteToggled($event)"
      (addToQueueClicked)="onAddToQueue($event)"
      (downloadClicked)="onDownload($event)"
      (removeClicked)="onRemove($event)"
  ></tr>
  </tbody>
</table>

<!-- Favorites Popup positioned fixed to avoid overflow clipping -->
@if (favoritesPopupState.showPopup()) {
  <div class="favorites-popup-wrapper" 
       [class.positioned]="favoritesPopupState.popupPositioned()">
    <app-favorites-popup
      [itemId]="currentTrackId()"
      [currentFolderId]="currentFolderId"
      (close)="favoritesPopupState.closePopup()">
    </app-favorites-popup>
  </div>
}
