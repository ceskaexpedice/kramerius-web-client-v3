<ng-container *ngIf="periodicalService.searchResults$ | async as searchResults">
  @if (searchResults.length > 0) {

    <div class="grid--container">

      <app-record-item *ngFor="let doc of searchResults" [record]="doc"></app-record-item>

    </div>

      <div class="pull-right">
        <app-paginator
          [showOnlyArrows]="true"
          [showPageSizeOptions]="false"
          [page]="periodicalService.page"
          [totalCount]="periodicalService.totalCount"
          [pageSize]="periodicalService.pageSize"
          [pageSizeOptions]="[60, 120, 180]"
          (pageChange)="periodicalService.goToPage($event)"
          (pageSizeChange)="periodicalService.changePageSize($event)">
        </app-paginator>
      </div>
  }
</ng-container>
