<div class="grid--container" *ngIf="children$ | async as children">

  <app-record-item *ngFor="let item of (children | skeletonList:60:(loading$ | async)); trackBy: trackByPid"
    [item]="item ? toRecordItemWithBadgeLayout(item, children) : undefined"
    [loading]="(loading$ | async) || false"></app-record-item>

</div>
