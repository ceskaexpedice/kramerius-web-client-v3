<div  class="grid--container">

  <app-item-card
    *ngFor="let item of children$ | async; trackBy: trackByPid"
    [uuid]="item.pid"
    [model]="item.model"
    [title]="item['date_range_end.day'] + '.' + item['date_range_end.month']"
    [subtitle]="('periodicalvolume-part-subtitle' | translate) + ' ' + item['part.number.str']"
    [showFavoriteButton]="false"
    [showAccessibilityBadge]="true"
    [className]="'card--fluid'"
  ></app-item-card>

</div>
