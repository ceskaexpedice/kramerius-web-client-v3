
<h2>Kalendár pre rok {{ year }}</h2>

<div class="months-calendar-container">
  <div class="month-calendar" *ngFor="let month of months; let i = index">
    <h3>{{ monthNames[i] }}</h3>
    <mat-calendar
      class="custom-label"
      [dateClass]="dateClass"
      [startAt]="getMonthDate(i)"
      [startView]="'month'"
      [minDate]="getMonthMinDate(i)"
      [maxDate]="getMonthMaxDate(i)"
      (selectedChange)="onDateSelected($event)">
    </mat-calendar>
  </div>
</div>
