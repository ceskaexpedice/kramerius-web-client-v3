<div class="grid--container">
  <app-item-card
    *ngFor="let year of years"
    [title]="year.year"
    [uuid]="year.pid"
    [showFavoriteButton]="false"
    [showAccessibilityBadge]="true"
    [accessibility]="year.accessibility"
    [className]="'card--fluid'"
    (click)="selectYear.emit(year.year)"
  ></app-item-card>
</div>
