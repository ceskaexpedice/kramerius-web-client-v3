<div class="years-timeline">

  <div class="range-years-row" *ngIf="rangeYears.length > 0">
    <div
      class="range-year-item"
      *ngFor="let year of rangeYears"
      [ngClass]="{
        'placeholder': year === null,
        'accessibility-available': year.exists,
        'accessibility-disabled': !year.exists
      }"
      (click)="selectYear.emit(year.year)"
    >
      <span class="range-year-label">{{ year.year }}</span>
    </div>
  </div>

  <div class="year-row" *ngFor="let row of yearsByDecades">
    <div class="row-line"></div>

    <div
      class="year-item--container"
      *ngFor="let year of row"
      [ngClass]="{
        'placeholder': year === null,
        'accessibility-available': isYearAvailable(year),
        'accessibility-disabled': !isYearAvailable(year)
      }"
      (click)="year !== null && selectYear.emit(year.toString())"
    >
      <div class="year-item" *ngIf="year !== null">
        <div class="year-item--wrapper">{{ year }}</div>
      </div>
    </div>
  </div>
</div>
