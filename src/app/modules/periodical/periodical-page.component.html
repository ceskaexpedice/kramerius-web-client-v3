<div class="page-container">
  <div class="page-container__inner">

    <app-filter-sidebar [isDisabled]="selectionService.selectionMode()">
      <app-periodical-filters></app-periodical-filters>
    </app-filter-sidebar>

    <div class="page-content" *ngIf="periodical.viewMode() as mode">

      <div class="page-content__filters">
        <!-- Action Toolbar -->
        <app-action-toolbar [hasCenterContent]="(!!periodical.selectedYear())">

          <div class="max-width-100" left *ngIf="periodical.document$ | async as document">
            <app-toolbar-header [title]="document?.['root.title'] || ''"
              [showBackButton]="recordHandler.shouldShowBackButton(document)"
              (titleClick)="recordHandler.navigateToPeriodical(document['root.pid'])"
              (goBack)="recordHandler.goBackClicked(document)">

              <!-- Show admin actions when in SearchResults mode and admin mode is active -->
              <app-admin-actions *ngIf="selectionService.selectionMode()" (exportRequested)="onExportSelected()"
                (editRequested)="onEditSelected($event)">
              </app-admin-actions>

            </app-toolbar-header>
          </div>

          <div center *ngIf="!selectionService.selectionMode()">
            <div *ngIf="periodical.selectedYear() as year;">
              <app-date-navigator [value]="year" (goToPrevious)="periodical.goToPreviousYear()"
                (goToNext)="periodical.goToNextYear()">
              </app-date-navigator>
            </div>
          </div>

          <div right>

            <div class="flex flex--align-center flex--gap-x2">

              <!-- Show normal controls when not in admin mode or not in SearchResults -->
              <ng-container *ngIf="!selectionService.selectionMode()">
                <div class="flex flex--align-center flex--gap-x6">
                  <app-toolbar-controls [showViewToggle]="periodical.viewMode() !== ViewMode.SearchResults"
                    [showFavorites]="true" [showShare]="true" [showQuote]="true" [showInfo]="false" [showSelect]="true"
                    [viewToggleOptions]="viewToggleOptions()" [activeViewValue]="periodical.activeCalendarGridControl()"
                    (viewChanged)="periodical.setView($event)" (infoClicked)="openRecordInfo()"
                    (favoritesClicked)="onFavoritesClicked($event)"
                    (shareClicked)="recordHandler.openShareDialog(periodical.metadata || null)"
                    (quoteClicked)="recordHandler.openCitationDialog(periodical.metadata || null)"
                    (selectClicked)="toggleSelectionMode()">
                  </app-toolbar-controls>

                  <app-results-sort [selectedSort]="periodical.sortBy" [selectedDirection]="periodical.sortDirection"
                    (sortChange)="onSortChange($event)">
                  </app-results-sort>
                </div>
              </ng-container>

              <!-- Show selected count when in admin mode and items are selected -->
              <ng-container *ngIf="selectionService.selectionMode() && selectionService.hasSelection()">
                <span class="selection-count">{{ selectionService.getSelectionSummary() }}</span>
              </ng-container>

              <button class="button outlined tertiary sm square-button" *ngIf="selectionService.selectionMode()"
                (click)="selectionService.toggleSelectionMode()">
                <i class="icon-close"></i>
              </button>

            </div>

          </div>

        </app-action-toolbar>
      </div>

      <!-- Content rendering based on view mode -->
      <div class="page-content__wrapper" [class.page-content__wrapper--with-sidebar]="showMetadataSidebar()"
        [class.wrapper--no-top-padding]="((periodical.selectedTags | async) || []).length > 0" appScrollHideHeader>

        <div class="page-content__main">

          <!-- Sticky Tags Bar -->
          <div class="page-content__sticky-tags" *ngIf="((periodical.selectedTags | async) || []).length > 0">
            <app-selected-tags [items]="(periodical.selectedTags | async) || []" [operators]="{}" [showClearAll]="((periodical.selectedTags | async) || []).length > 1"
              [showOperators]="false" [translateItems]="true" (remove)="periodical.removeFilter($event)"
              (removeGroup)="periodical.resetOperator($event)" (clearAll)="periodical.clearAllFilters()"
              clearButtonPosition="left">
            </app-selected-tags>
          </div>

          <app-periodical-years-timeline *ngIf="mode === ViewMode.Timeline" [years]="periodical.periodicalYears"
            (selectYear)="periodical.onSelectYear($event)">
          </app-periodical-years-timeline>

          <app-periodical-years-grid *ngIf="mode === ViewMode.GridYears" [years]="periodical.periodicalYears"
            (selectYear)="periodical.onSelectYear($event)">
          </app-periodical-years-grid>

          <app-periodical-year-issues-calendar *ngIf="mode === ViewMode.Calendar"
            [year]="periodical.selectedYear() || ''" [pid]="periodical.getSelectedPid() || ''">
          </app-periodical-year-issues-calendar>

          <app-periodical-year-issues-grid *ngIf="mode === ViewMode.GridIssues" [year]="periodical.selectedYear() || ''"
            [pid]="periodical.getSelectedPid() || ''">
          </app-periodical-year-issues-grid>

          <app-periodical-search-results *ngIf="mode === ViewMode.SearchResults">
          </app-periodical-search-results>

          <!-- Loading and error states - scoped to main content -->
          <app-inline-loader
            *ngIf="(periodical.loading$ | async) && mode !== ViewMode.GridIssues && mode !== ViewMode.GridYears"
            [overlay]="true"></app-inline-loader>
        </div>

        @if (!showMetadataSidebar()) {
        <button class="floating-sidebar-toggle button icon-button primary rounded" (click)="toggleMetadataSidebar()">
          <i class="icon-info-full"></i>
        </button>
        }

        <!-- Right Sidebar -->
        <ng-container *ngIf="periodical.metadata">
          <div class="page-content__sidebar-right"
            [class.page-content__sidebar-right--absolute]="sidebarPositionMode === 'absolute'"
            [class.page-content__sidebar-right--relative]="sidebarPositionMode === 'relative'"
            [class.collapsed]="!showMetadataSidebar()">
            <app-metadata-sidebar [metadata]="periodical.metadata" mode="floating"
              [tools]="{search: true, export: false, description: true}" (close)="toggleMetadataSidebar()">
            </app-metadata-sidebar>
          </div>
        </ng-container>

      </div>

    </div>

  </div>
</div>

<!-- Favorites Popup positioned fixed to avoid overflow clipping -->
@if (favoritesHelper.favoritesPopupState.showPopup()) {
<div class="favorites-popup-wrapper" [class.positioned]="favoritesHelper.favoritesPopupState.popupPositioned()">
  <app-favorites-popup [itemId]="favoritesHelper.currentItemId()" [itemName]="favoritesHelper.currentItemName()"
    [showHierarchySelector]="favoritesHelper.showHierarchySelector()" [document]="periodical.metadata"
    (close)="onFavoritesPopupClose()" (success)="onFavoritesPopupClose()">
  </app-favorites-popup>
</div>
}
