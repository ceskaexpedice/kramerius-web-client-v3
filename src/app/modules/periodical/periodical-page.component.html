<div class="page-container">
  <div class="page-container__inner">

    <app-filter-sidebar [isDisabled]="selectionService.selectionMode()">
      <app-periodical-filters></app-periodical-filters>
    </app-filter-sidebar>

    <div class="page-content" *ngIf="periodical.viewMode() as mode">

      <div class="page-content__filters">
        <!-- Action Toolbar -->
        <app-action-toolbar [hasCenterContent]="periodical.viewMode() !== ViewMode.SearchResults && !selectionService.selectionMode()">

          <div class="max-width-100" left *ngIf="periodical.document$ | async as document">
            <app-toolbar-header
              [title]="document?.['root.title'] || ''"
              [showBackButton]="recordHandler.shouldShowBackButton(document)"
              (titleClick)="recordHandler.navigateToPeriodical(document['root.pid'])"
              (goBack)="recordHandler.goBackClicked(document)">

              <!-- Show admin actions when in SearchResults mode and admin mode is active -->
              <app-admin-actions
                *ngIf="selectionService.selectionMode()"
                (exportRequested)="onExportSelected()"
                (editRequested)="onEditSelected($event)">
              </app-admin-actions>

            </app-toolbar-header>
          </div>

          <div center
               *ngIf="!selectionService.selectionMode()"
          >
            <div *ngIf="periodical.selectedYear() as year;">
              <app-date-navigator
                [value]="year"
                (goToPrevious)="periodical.goToPreviousYear()"
                (goToNext)="periodical.goToNextYear()">
              </app-date-navigator>
            </div>
          </div>

          <div right>

            <div class="flex flex--align-center">

              <!-- Show normal controls when not in admin mode or not in SearchResults -->
              <ng-container *ngIf="!selectionService.selectionMode()">
                <app-toolbar-controls
                  [showViewToggle]="periodical.viewMode() !== ViewMode.SearchResults"
                  [showFavorites]="true"
                  [showShare]="true"
                  [showQuote]="true"
                  [showInfo]="true"
                  [showSelect]="true"
                  [viewToggleOptions]="[
                  { label: 'layout--calendar', icon: 'icon-calendar', value: 'calendar' },
                  { label: 'layout--grid', icon: 'icon-grid-1', value: 'grid' }
                ]"
                  [activeViewValue]="periodical.activeCalendarGridControl()"
                  (viewChanged)="periodical.setView($event)"
                  (infoClicked)="openRecordInfo()"
                  (shareClicked)="recordHandler.openShareDialog(periodical.metadata || null)"
                  (quoteClicked)="recordHandler.openCitationDialog(periodical.metadata || null)"
                  (selectClicked)="toggleSelectionMode()"
                >
                </app-toolbar-controls>

                <app-results-sort
                  [selectedSort]="periodical.sortBy"
                  [selectedDirection]="periodical.sortDirection"
                  (sortChange)="onSortChange($event)">
                </app-results-sort>
              </ng-container>

                <!-- Show selected count when in admin mode and items are selected -->
                <ng-container *ngIf="selectionService.selectionMode() && selectionService.hasSelection()">
                  <span class="selection-count">{{ selectionService.getSelectionSummary() }}</span>
                </ng-container>

              <button class="button outlined tertiary sm square-button" *ngIf="selectionService.selectionMode()" (click)="selectionService.toggleSelectionMode()">
                <i class="icon-x"></i>
              </button>

            </div>

          </div>

        </app-action-toolbar>
      </div>

      <!-- Content rendering based on view mode -->
      <div class="page-content__wrapper">

        <app-selected-tags
          *ngIf="((periodical.selectedTags | async) || []).length > 0"
          [items]="(periodical.selectedTags | async) || []"
          [operators]="{}"
          [showOperators]="false"
          [translateItems]="true"
          (remove)="periodical.removeFilter($event)"
          (removeGroup)="periodical.resetOperator($event)"
          (clearAll)="periodical.clearAllFilters()"
          clearButtonPosition="left">
        </app-selected-tags>

        <app-periodical-years-timeline
          *ngIf="mode === ViewMode.Timeline"
          [years]="periodical.periodicalYears"
          (selectYear)="periodical.onSelectYear($event)">
        </app-periodical-years-timeline>

        <app-periodical-years-grid
          *ngIf="mode === ViewMode.GridYears"
          [years]="periodical.periodicalYears"
          (selectYear)="periodical.onSelectYear($event)">
        </app-periodical-years-grid>

        <app-periodical-year-issues-calendar
          *ngIf="mode === ViewMode.Calendar"
          [year]="periodical.selectedYear() || ''"
          [pid]="periodical.getSelectedPid() || ''">
        </app-periodical-year-issues-calendar>

        <app-periodical-year-issues-grid
          *ngIf="mode === ViewMode.GridIssues"
          [year]="periodical.selectedYear() || ''"
          [pid]="periodical.getSelectedPid() || ''">
        </app-periodical-year-issues-grid>

        <app-periodical-search-results
          *ngIf="mode === ViewMode.SearchResults">
        </app-periodical-search-results>

      </div>

      <!-- Loading and error states -->
      <div *ngIf="periodical.loading$ | async">{{ 'loading' | translate }}</div>

    </div>
  </div>
</div>
