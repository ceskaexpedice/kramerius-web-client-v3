<section>
  <div class="section-header">
    <h2>{{ 'model.periodical' | translate }}</h2>
    <a href="#" class="show-all">{{'filters.btn_show_more' | translate}} →</a>
  </div>

  <div class="carousel-wrapper">
    <app-carousel *ngIf="periodicals$ | async as periodicals" [edgeToEdge]="true">
      <app-item-card
        *ngFor="let item of periodicals"
        [uuid]="item.uuid"
        [title]="item.title"
        [subtitle]="item.year"
        [link]="'/detail/' + item.title"
      ></app-item-card>
    </app-carousel>
  </div>

</section>
