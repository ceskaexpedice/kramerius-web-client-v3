<section class="periodicals-section">
  <div class="section-header">
    <h2>Periodikum</h2>
    <a href="#" class="show-all">Zobrazit vše →</a>
  </div>

  <app-carousel *ngIf="periodicals$ | async as periodicals">
    <app-item-card
      *ngFor="let item of periodicals"
      [uuid]="item.uuid"
      [title]="item.title"
      [subtitle]="item.year"
      [link]="'/detail/' + item.title"
    ></app-item-card>
  </app-carousel>
</section>
