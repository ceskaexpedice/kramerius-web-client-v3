<div class="tags-row">

  @for (tag of suggestedTags; track tag.filter) {
    <a class="tag"
       aria-label="{{ 'search-for' | translate }} {{ tag.text | localized }}"
       [href]="searchService.getRedirectUrl(tag.filter)" (click)="onTagSelected(tag.filter)">{{ tag.text | localized }}</a>
  }

</div>
