<section>
  <div class="section-header">
    <h2>{{ 'monograph' | translate | titlecase }}</h2>
    <a class="show-all" (click)="showMore()">{{'btn_show_more' | translate}} →</a>
  </div>

  <div class="carousel-wrapper">
    <app-carousel *ngIf="books$ | async as books" [edgeToEdge]="true">

      <app-record-item
        *ngFor="let item of books"
        [record]="item"
      >
      </app-record-item>

    </app-carousel>
  </div>

</section>
