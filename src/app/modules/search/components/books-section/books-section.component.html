<section>
  <div class="section-header">
    <h2>{{ 'monograph' | translate | titlecase }}</h2>
    <a href="#" class="show-all">{{'btn_show_more' | translate}} →</a>
  </div>

  <div class="carousel-wrapper">
    <app-carousel *ngIf="books$ | async as books" [edgeToEdge]="true">
      <app-item-card
        *ngFor="let item of books"
        [uuid]="item.pid"
        [model]="item.model"
        [title]="item['title.search']"
        [subtitle]="item.year"
        [link]="'/detail/' + item['title.search']"
      ></app-item-card>
    </app-carousel>
  </div>

</section>
