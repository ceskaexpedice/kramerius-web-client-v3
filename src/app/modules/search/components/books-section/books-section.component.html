<section>
  <div class="section-header">
    <h2>{{ 'monograph' | translate | titlecase }}</h2>
    <button class="show-all with-icon p-right-0" (click)="showMore()">
      <span class="text">{{'btn_show_more' | translate}}</span>
      <i class="icon-arrow-right-3"></i>
    </button>
  </div>

  <div class="carousel-wrapper">
    <app-inline-loader *ngIf="loading$ | async" message="loading-books">
    </app-inline-loader>

    <div *ngIf="!(loading$ | async)">
      <app-carousel *ngIf="books$ | async as books" [edgeToEdge]="true">
        <app-record-item *ngFor="let item of books" [showModel]="false" [item]="toRecordItem(item)">
        </app-record-item>
      </app-carousel>
    </div>
  </div>
</section>
