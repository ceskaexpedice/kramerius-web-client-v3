<div class="page-container">
  <div class="page-container__inner">

    <app-filter-sidebar>
      <app-saved-lists-filters></app-saved-lists-filters>
    </app-filter-sidebar>

    <div class="page-content">

      <div class="page-content__filters">
        <app-action-toolbar>

          @if (activeFolder | async; as folder) {
            <div left class="max-width-100">
              <app-toolbar-header
                [title]="folder.name"
                [showBackButton]="false">
              </app-toolbar-header>
            </div>

          }

          <div right>
            <app-toggle-button-group
              [options]="viewOptions"
              [value]="view()"
              (valueChange)="setView($event)"
            />
          </div>
        </app-action-toolbar>
      </div>

      <div class="page-content__wrapper">

        <div [ngClass]="view() === ViewOptions.grid ? '' : 'list--container'">

          <!-- GRID VIEW -->
          @if (view() === ViewOptions.grid) {

            <ng-container *ngIf="activeFolderItems | async as nonPageResults">
              @if (nonPageResults.length > 0) {
                <div class="grid--container">

                  <app-record-item *ngFor="let doc of nonPageResults" [record]="doc"></app-record-item>

                </div>
              }
            </ng-container>

          } @else {

            <!-- LIST VIEW -->
            <ng-container *ngIf="activeFolderItems | async as nonPageResults">
              @if (nonPageResults.length > 0) {
                <app-record-item-list [records]="nonPageResults"></app-record-item-list>
              }
            </ng-container>
          }

        </div>

      </div>

    </div>
  </div>
</div>
